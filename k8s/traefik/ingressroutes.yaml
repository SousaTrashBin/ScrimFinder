apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scrimfinder-routes
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/matchmaking`)
      kind: Rule
      services:
        - name: matchmaking-service
          port: 8080
    - match: PathPrefix(`/api/v1/ranking`)
      kind: Rule
      services:
        - name: ranking-service
          port: 8080
    - match: PathPrefix(`/api/v1/history`)
      kind: Rule
      services:
        - name: match-history-service
          port: 8080
    - match: PathPrefix(`/api/v1/riot`)
      kind: Rule
      services:
        - name: detail-filling-service
          port: 8080
    - match: PathPrefix(`/api/v1/training`)
      kind: Rule
      services:
        - name: training-service
          port: 8000
    - match: PathPrefix(`/api/v1/analysis`)
      kind: Rule
      services:
        - name: analysis-service
          port: 8001