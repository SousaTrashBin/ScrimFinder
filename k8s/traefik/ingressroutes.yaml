apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scrimfinder-routes
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/matchmaking`)
      kind: Rule
      priority: 100
      services:
        - name: matchmaking-service
          namespace: default
          port: 8080
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/api/v1/ranking`)
      kind: Rule
      priority: 100
      services:
        - name: ranking-service
          namespace: default
          port: 8080
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/api/v1/history`)
      kind: Rule
      priority: 100
      services:
        - name: match-history-service
          namespace: default
          port: 8080
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/api/v1/riot`)
      kind: Rule
      priority: 100
      services:
        - name: detail-filling-service
          namespace: default
          port: 8080
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/api/v1/training`)
      kind: Rule
      priority: 100
      services:
        - name: training-service
          namespace: default
          port: 8000
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/api/v1/analysis`)
      kind: Rule
      priority: 100
      services:
        - name: analysis-service
          namespace: default
          port: 8001
      middlewares:
        - name: sablier-middleware
          namespace: kube-system
        - name: api-ratelimit
          namespace: kube-system
    - match: PathPrefix(`/dashboard`) || PathPrefix(`/api`)
      kind: Rule
      priority: 10
      services:
        - name: api@internal
          kind: TraefikService
      middlewares:
        - name: dashboard-auth
          namespace: kube-system
