    name: training-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: training-service
  namespace: default
spec:
  selector:
    app: training-service
  ports:
  - name: http
    port: 8000
    targetPort: 8000
---
