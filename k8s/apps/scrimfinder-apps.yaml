apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchmaking-service
  template:
    metadata:
      labels:
        app: matchmaking-service
    spec:
      containers:
      - name: matchmaking-service
        image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/matchmaking-service:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9000
          name: grpc
        env:
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: jdbc:postgresql://matchmaking-db:5432/matchmaking
        - name: QUARKUS_DATASOURCE_USERNAME
          value: postgres
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: postgres
        - name: QUARKUS_REDIS_HOSTS
          value: redis://matchmaking-redis:6379
        - name: RANKING_SVC_HOST
          value: ranking-service
        - name: RANKING_SVC_PORT
          value: "9001"
        - name: PLAYER_FILLING_SVC_HOST
          value: detail-filling-service
        - name: PLAYER_FILLING_SVC_PORT
          value: "8080"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/v1/matchmaking/q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/matchmaking/q/health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-service
  namespace: default
spec:
  selector:
    app: matchmaking-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9000
    targetPort: 9000
---
