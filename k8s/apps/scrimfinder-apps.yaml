apiVersion: apps/v1
kind: Deployment
metadata:
  name: matchmaking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matchmaking-service
  template:
    metadata:
      labels:
        app: matchmaking-service
    spec:
      containers:
      - name: matchmaking-service
        image: scrimfinder/matchmaking-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: jdbc:postgresql://matchmaking-db:5432/matchmaking
        - name: QUARKUS_DATASOURCE_USERNAME
          value: postgres
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: postgres
        - name: QUARKUS_REDIS_HOSTS
          value: redis://matchmaking-redis:6379
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-service
spec:
  selector:
    app: matchmaking-service
  ports:
  - port: 8080
    targetPort: 8080
---
