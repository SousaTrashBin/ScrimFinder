apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-service
  template:
    metadata:
      labels:
        app: training-service
    spec:
      containers:
      - name: training-service
        image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/training-service:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PLATFORM_DB
          value: postgresql://postgres:postgres@matchmaking-db:5432/matchmaking
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: ai-storage
          mountPath: /app/data
      volumes:
      - name: ai-storage
        persistentVolumeClaim:
          claimName: ai-storage-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: training-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
