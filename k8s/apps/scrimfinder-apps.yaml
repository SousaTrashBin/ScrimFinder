---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-history-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: match-history-service
  template:
    metadata:
      labels:
        app: match-history-service
    spec:
      containers:
      - name: match-history-service
        image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/match-history-service:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: jdbc:postgresql://history-db:5432/history
        - name: QUARKUS_DATASOURCE_USERNAME
          value: postgres
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: postgres
        - name: TRAINING_SVC_HOST
          value: training-service
        - name: TRAINING_SVC_RPC_PORT
          value: "8000"
        - name: PLAYER_FILLING_SVC_HOST
          value: detail-filling-service
        - name: PLAYER_FILLING_SVC_PORT
          value: "8080"
        - name: PLAYER_FILLING_SVC_URL
          value: http://detail-filling-service:8080
        livenessProbe:
          httpGet:
            path: /api/v1/history/q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/history/q/health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: match-history-service-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: match-history-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: match-history-service
  namespace: default
spec:
  selector:
    app: match-history-service
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
