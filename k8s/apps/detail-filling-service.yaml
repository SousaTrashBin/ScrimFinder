apiVersion: apps/v1
kind: Deployment
metadata:
  name: detail-filling-service
  namespace: scrimfinder
  labels:
    app: detail-filling-service
spec:
  strategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      app: detail-filling-service
  template:
    metadata:
      name: detail-filling-service-pod
      namespace: scrimfinder
      labels:
        app: detail-filling-service
    spec:
      containers:
        - name: detail-filling-service
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/detail-filling-service:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "16Mi"
              cpu: "100m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/v1/riot/q/health/live
              port: 8080
            failureThreshold: 2
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/riot/q/health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
          envFrom:
            - configMapRef:
                name: detail-filling-service-config
            - secretRef:
                name: detail-filling-service-secrets
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: detail-filling-service-config
data:
  REDIS_URL: "redis://redis:6379"
  QUARKUS_REDIS_HOSTS: "redis://redis:6379"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detail-filling-service-hpa
  namespace: scrimfinder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detail-filling-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: v1
kind: Service
metadata:
  name: detail-filling-service-service
  namespace: scrimfinder
spec:
  selector:
    app: detail-filling-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
  type: ClusterIP
      