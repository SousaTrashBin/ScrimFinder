apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-service
  namespace: scrimfinder
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: training-service
  template:
    metadata:
      labels:
        app: training-service
    spec:
      containers:
        - name: training-service
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/training-service:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: training-service-secrets
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: ai-storage
              mountPath: /app/data
      volumes:
        - name: ai-storage
          persistentVolumeClaim:
            claimName: ai-storage-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: training-service-hpa
  namespace: scrimfinder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: training-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: training-service
  namespace: scrimfinder
spec:
  selector:
    app: training-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000