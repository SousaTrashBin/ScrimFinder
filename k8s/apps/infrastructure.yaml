apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: scrimfinder
data:
  init-db.sql: |
    CREATE DATABASE matchmaking;
    CREATE DATABASE ranking;
    CREATE DATABASE history;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: scrimfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: scrimfinder
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d/
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data-pvc
      - name: init-scripts
        configMap:
          name: postgres-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-db
  namespace: scrimfinder
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-db
  namespace: scrimfinder
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: history-db
  namespace: scrimfinder
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: scrimfinder
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-redis
  namespace: scrimfinder
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: filling-cache
  namespace: scrimfinder
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-storage-pvc
  namespace: scrimfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
