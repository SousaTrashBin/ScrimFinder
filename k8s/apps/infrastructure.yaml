apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
data:
  init-db.sql: |
    CREATE DATABASE matchmaking;
    CREATE DATABASE ranking;
    CREATE DATABASE history;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d/
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-db
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-db
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: history-db
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-redis
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: filling-cache
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-storage-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
