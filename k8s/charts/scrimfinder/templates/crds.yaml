apiVersion: batch/v1
kind: Job
metadata:
  name: install-vpa-crds
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-16"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: vpa-crds
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              # Install VPA CRDs from a URL
              kubectl apply --server-side -f \
                https://github.com/kubernetes/autoscaler/blob/master/vertical-pod-autoscaler/deploy/vpa-crd.yaml
              # Wait for CRDs to be established
              kubectl wait --for=condition=Established \
                crd/verticalpodautoscalers.poc.autoscaling.k8s.io \
                crd/verticalpodautoscalercheckpoints.poc.autoscaling.k8s.io \
                --timeout=60s
  