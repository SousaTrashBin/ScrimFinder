apiVersion: batch/v1
kind: Job
metadata:
  name: install-vpa-crds
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: vpa-crds
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              # Install VPA CRDs from a URL
              kubectl apply --server-side -f \
                https://github.com/kubernetes/autoscaler/blob/master/vertical-pod-autoscaler/deploy/vpa-v1-crd-gen.yaml
              # Wait for CRDs to be established
              kubectl wait --for=condition=Established \
                crd/verticalpodautoscalers.autoscaling.k8s.io \
                crd/verticalpodautoscalercheckpoints.autoscaling.k8s.io \
                --timeout=60s
  