apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-smoke-test"
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}-smoke-test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['/bin/sh', '-c']
      args: 
        - |
          {{- range $name, $config := .Values.services }}
          echo "Testing {{ $name }}..."
          # Retry 5 times, waiting 5s between retries, if connection is refused or returns error
          curl -s --fail --retry 5 --retry-delay 5 --retry-all-errors http://{{ $name }}:{{ (index $config.ports 0).containerPort }}{{ $config.healthPath }}/ready || exit 1
          {{- end }}

          echo "All services are up!"
  restartPolicy: Never
