apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: {{ .Values.global.namespace }}
data:
  init-db.sql: |
    CREATE DATABASE matchmaking;
    CREATE DATABASE ranking;
    CREATE DATABASE history;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.infrastructure.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        resources:
          {{- toYaml .Values.infrastructure.postgres.resources | nindent 10 }}
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d/
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data-pvc
      - name: init-scripts
        configMap:
          name: postgres-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-db
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-db
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: history-db
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: postgres-db
  ports:
  - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        resources:
          {{- toYaml .Values.infrastructure.redis.resources | nindent 10 }}
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: matchmaking-redis
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: filling-cache
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: redis-cache
  ports:
  - port: 6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-storage-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.infrastructure.aiStorage.storage }}
