{{- $namespace := .Values.global.namespace -}}
{{- $postgresResources := .Values.infrastructure.postgres.resources -}}
{{- $redisResources := .Values.infrastructure.redis.resources -}}

{{- /* postgreSQL instances */ -}}
{{- range $dbName := (list "matchmaking" "ranking" "history") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $dbName }}-db-pvc
  namespace: {{ $namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $.Values.infrastructure.postgres.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $dbName }}-db
  namespace: {{ $namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $dbName }}-db
  template:
    metadata:
      labels:
        app: {{ $dbName }}-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-password
        - name: POSTGRES_DB
          value: {{ $dbName }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        resources:
          {{- toYaml $postgresResources | nindent 10 }}
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "pg_isready -U $POSTGRES_USER"]
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ $dbName }}-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $dbName }}-db
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ $dbName }}-db
  ports:
  - port: 5432
---
{{- end }}

{{- /* redis instances */ -}}
{{- range $redisName := (list "matchmaking-redis" "filling-cache") }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $redisName }}
  namespace: {{ $namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $redisName }}
  template:
    metadata:
      labels:
        app: {{ $redisName }}
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        resources:
          {{- toYaml $redisResources | nindent 10 }}
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $redisName }}
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ $redisName }}
  ports:
  - port: 6379
---
{{- end }}

{{- /* shared AI Storage */ -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-storage-pvc
  namespace: {{ $namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.infrastructure.aiStorage.storage }}
