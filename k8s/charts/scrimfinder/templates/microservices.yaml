{{- range $name, $config := .Values.services }}
{{- if $config.ports }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  {{- if not ($config.autoscaling).enabled }}
  replicas: {{ $config.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $config.securityContext | default $.Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ $name }}
        image: "{{ $.Values.global.imageRegistry }}/{{ $name }}:{{ $.Values.global.imageTag }}"
        {{- with $config.containerSecurityContext | default $.Values.global.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        {{- range $config.ports }}
        - containerPort: {{ .containerPort }}
          name: {{ .name }}
        {{- end }}
        env:
        {{- range $key, $val := $config.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        - name: RIOT_API_KEY
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: riot-api-key
        - name: QUARKUS_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-user
        - name: QUARKUS_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: scrimfinder-secrets
              key: db-password

        resources:
          {{- toYaml $config.resources | nindent 10 }}
        {{- if eq ($config.healthType | default "http") "http" }}
        livenessProbe:
          httpGet:
            path: {{ $config.healthPath }}/live
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: {{ $config.healthPath }}/ready
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        {{- else if eq $config.healthType "tcp" }}
        livenessProbe:
          tcpSocket:
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        {{- end }}
        {{- if $config.persistence }}
        volumeMounts:
        - name: {{ $config.persistence.claimName }}
          mountPath: {{ $config.persistence.mountPath }}
        {{- end }}
      {{- with $config.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $config.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $config.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $config.persistence }}
      volumes:
      - name: {{ $config.persistence.claimName }}
        persistentVolumeClaim:
          claimName: {{ $config.persistence.claimName }}
      {{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-hpa
  namespace: {{ $.Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ ($config.autoscaling).minReplicas | default 1 }}
  maxReplicas: {{ ($config.autoscaling).maxReplicas | default 5 }}
  metrics:
  {{- if ($config.autoscaling).targetCPUUtilizationPercentage | default 70 }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ ($config.autoscaling).targetCPUUtilizationPercentage | default 70 }}
  {{- end }}
  {{- if ($config.autoscaling).targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ ($config.autoscaling).targetMemoryUtilizationPercentage }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
  {{- range $config.ports }}
  - name: {{ .name }}
    port: {{ .containerPort }}
    targetPort: {{ .containerPort }}
  {{- end }}
---
{{- end }}
{{- end }}
