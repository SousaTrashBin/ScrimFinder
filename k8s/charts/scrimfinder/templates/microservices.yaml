{{- range $name, $config := .Values.services }}
{{- if $config.ports }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
      - name: {{ $name }}
        image: "{{ $.Values.global.imageRegistry }}/{{ $name }}:{{ $.Values.global.imageTag }}"
        ports:
        {{- range $config.ports }}
        - containerPort: {{ .containerPort }}
          name: {{ .name }}
        {{- end }}
        env:
        {{- range $key, $val := $config.env }}
        - name: {{ $key }}
          value: {{ $val | quote }}
        {{- end }}
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        {{- if eq ($config.healthType | default "http") "http" }}
        livenessProbe:
          httpGet:
            path: {{ $config.healthPath }}/live
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: {{ $config.healthPath }}/ready
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 20
          periodSeconds: 10
        {{- else if eq $config.healthType "tcp" }}
        livenessProbe:
          tcpSocket:
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: {{ $config.healthPort | default (index $config.ports 0).containerPort }}
          initialDelaySeconds: 20
          periodSeconds: 10
        {{- end }}
        {{- if $config.persistence }}
        volumeMounts:
        - name: {{ $config.persistence.claimName }}
          mountPath: {{ $config.persistence.mountPath }}
        {{- end }}
      {{- if $config.persistence }}
      volumes:
      - name: {{ $config.persistence.claimName }}
        persistentVolumeClaim:
          claimName: {{ $config.persistence.claimName }}
      {{- end }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-hpa
  namespace: {{ $.Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
spec:
  selector:
    app: {{ $name }}
  ports:
  {{- range $config.ports }}
  - name: {{ .name }}
    port: {{ .containerPort }}
    targetPort: {{ .containerPort }}
  {{- end }}
---
{{- end }}
{{- end }}
