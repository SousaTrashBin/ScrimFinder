{{- if .Values.global.useSecretManager }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scrimfinder-secrets-store-csi-driver-rolebinding
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secretproviderclasses-role
subjects:
  - kind: ServiceAccount
    name: secrets-store-csi-driver
    namespace: {{ .Values.global.namespace }}
{{- end }}
{{- if .Values.global.useArgoApplications }}
# Let Argo CD install VPA CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-vpa-target-reader-binding
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:vpa-target-reader
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: argocd

{{- end }}
