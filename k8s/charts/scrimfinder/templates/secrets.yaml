{{- if .Values.global.useSecretManager }}
# from https://oneuptime.com/blog/post/2026-02-26-argocd-csi-secrets-store-driver/view
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-scrimfinder
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-15"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}riot-api-key/versions/latest"
        path: "riot-api-key"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}db-user/versions/latest"
        path: "db-user"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}db-password/versions/latest"
        path: "db-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}redis-password/versions/latest"
        path: "redis-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}rabbitmq-user/versions/latest"
        path: "rabbitmq-user"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}rabbitmq-password/versions/latest"
        path: "rabbitmq-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/{{ .Values.global.secretNamePrefix }}rabbitmq-erlang-cookie/versions/latest"
        path: "rabbitmq-erlang-cookie"
  secretObjects:
    - secretName: scrimfinder-secrets
      type: Opaque
      data:
        - objectName: riot-api-key
          key: riot-api-key
        - objectName: db-user
          key: db-user
        - objectName: db-password
          key: db-password
        - objectName: redis-password
          key: redis-password
        - objectName: rabbitmq-user
          key: rabbitmq-user
        - objectName: rabbitmq-password
          key: rabbitmq-password
        - objectName: rabbitmq-erlang-cookie
          key: rabbitmq-erlang-cookie
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: scrimfinder-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  riot-api-key: {{ .Values.secrets.riotApiKey | quote }}
  db-user: {{ .Values.secrets.dbUser | quote }}
  db-password: {{ .Values.secrets.dbPassword | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  rabbitmq-user: {{ .Values.secrets.rabbitmqUser | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | quote }}
  rabbitmq-erlang-cookie: {{ .Values.secrets.rabbitmqErlangCookie | quote }}
{{- end }}
