# from https://oneuptime.com/blog/post/2026-02-26-argocd-csi-secrets-store-driver/view
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-scrimfinder
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-15"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/riot-api-key/versions/latest"
        path: "riot-api-key"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/db-user/versions/latest"
        path: "db-user"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/db-password/versions/latest"
        path: "db-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/ml-db-password/versions/latest"
        path: "ml-db-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/jwt-db-password/versions/latest"
        path: "jwt-db-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/redis-password/versions/latest"
        path: "redis-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/rabbitmq-user/versions/latest"
        path: "rabbitmq-user"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/rabbitmq-password/versions/latest"
        path: "rabbitmq-password"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/rabbitmq-erlang-cookie/versions/latest"
        path: "rabbitmq-erlang-cookie"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/jwt-secret/versions/latest"
        path: "jwt-secret"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/discord-bot-secret/versions/latest"
        path: "discord-bot-secret"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/jwt-private-key/versions/latest"
        path: "jwt-private-key"
      - resourceName: "projects/{{ .Values.global.projectID }}/secrets/jwt-public-key/versions/latest"
        path: "jwt-public-key"
  secretObjects:
    - secretName: scrimfinder-secrets
      type: Opaque
      data:
        - objectName: riot-api-key
          key: riot-api-key
        - objectName: db-user
          key: db-user
        - objectName: db-password
          key: db-password
        - objectName: ml-db-password
          key: ml-db-password
        - objectName: jwt-db-password
          key: jwt-db-password
        - objectName: redis-password
          key: redis-password
        - objectName: rabbitmq-user
          key: rabbitmq-user
        - objectName: rabbitmq-password
          key: rabbitmq-password
        - objectName: rabbitmq-erlang-cookie
          key: rabbitmq-erlang-cookie
        - objectName: jwt-secret
          key: jwt-secret
        - objectName: discord-bot-secret
          key: discord-bot-secret
        - objectName: jwt-private-key
          key: jwt-private-key
        - objectName: jwt-public-key
          key: jwt-public-key
---
apiVersion: v1
kind: Secret
metadata:
  name: scrimfinder-secrets
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-14"
type: Opaque
stringData:
  riot-api-key:             {{ .Values.secrets.riotApiKey | quote }}
  db-user:                  {{ .Values.secrets.dbUser | quote }}
  db-password:              {{ .Values.secrets.dbPassword | quote }}
  ml-db-password:           {{ .Values.secrets.mlDbPassword | default .Values.secrets.dbPassword | quote }}
  redis-password:           {{ .Values.secrets.redisPassword | default "redispassword" | quote }}
  rabbitmq-user:            {{ .Values.secrets.rabbitmqUser | default "user" | quote }}
  rabbitmq-password:        {{ .Values.secrets.rabbitmqPassword | default "rabbitmqpassword" | quote }}
  rabbitmq-erlang-cookie:   {{ .Values.secrets.rabbitmqErlangCookie | default "erlangcookie" | quote }}
  jwt-secret:               {{ .Values.secrets.jwtSecret | quote }}
  discord-bot-secret:       {{ .Values.secrets.discordBotSecret | quote }}
  jwt-db-password:          {{ .Values.secrets.jwtDbPassword | default .Values.secrets.dbPassword | quote }}
  jwt-private-key:          {{ .Values.secrets.jwtPrivateKey | default "" | quote }}
  jwt-public-key:           {{ .Values.secrets.jwtPublicKey | default "" | quote }}
