apiVersion: batch/v1
kind: Job
metadata:
  name: scrimfinder-secret-syncer
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-14"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ .Values.global.secretsServiceAccountName | default "scrimfinder-secrets-reader" }}
      restartPolicy: Never
      containers:
      - name: sync
        image: busybox:1.36
        command: ["sh", "-c", "ls /mnt/secrets >/dev/null"]
        volumeMounts:
        - name: secrets
          mountPath: /mnt/secrets
          readOnly: true
      volumes:
      - name: secrets
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: gcp-scrimfinder
