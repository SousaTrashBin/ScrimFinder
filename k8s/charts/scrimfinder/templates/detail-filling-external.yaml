{{- if .Values.detailFillingExternal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: detail-filling-service
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  type: ExternalName
  externalName: {{ .Values.detailFillingExternal.externalName | default .Values.detailFillingExternalName | default "example.cloudfunctions.net" }}
{{- end }}
