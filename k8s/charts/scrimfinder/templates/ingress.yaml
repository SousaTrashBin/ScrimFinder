apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-ratelimit
  namespace: {{ .Values.global.namespace }}
spec:
  rateLimit:
    average: 100
    burst: 50
---
{{- if .Values.detailFillingExternal.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: detail-filling-prefix
  namespace: {{ .Values.global.namespace }}
spec:
  addPrefix:
    prefix: /getFilledPlayer
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scrimfinder-routes
  namespace: {{ .Values.global.namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api/v1/matchmaking`)
      kind: Rule
      priority: 100
      services:
        - name: matchmaking-service
          port: 8080
      middlewares:
        - name: api-ratelimit
    - match: PathPrefix(`/api/v1/ranking`)
      kind: Rule
      priority: 100
      services:
        - name: ranking-service
          port: 8080
      middlewares:
        - name: api-ratelimit
    - match: PathPrefix(`/api/v1/history`)
      kind: Rule
      priority: 100
      services:
        - name: match-history-service
          port: 8080
      middlewares:
        - name: api-ratelimit
    - match: PathPrefix(`/api/v1/riot`)
      kind: Rule
      priority: 100
      services:
        - name: detail-filling-service
          {{- if .Values.detailFillingExternal.enabled }}
          port: 443
          scheme: https
          passHostHeader: false
          {{- else }}
          port: 8080
          {{- end }}
      middlewares:
        {{- if .Values.detailFillingExternal.enabled }}
        - name: detail-filling-prefix
        {{- end }}
        - name: api-ratelimit
    - match: PathPrefix(`/api/v1/training`)
      kind: Rule
      priority: 100
      services:
        - name: training-service
          port: 8000
      middlewares:
        - name: api-ratelimit
    - match: PathPrefix(`/api/v1/analysis`)
      kind: Rule
      priority: 100
      services:
        - name: analysis-service
          port: 8001
      middlewares:
        - name: api-ratelimit
