apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: detail-filling-service-redis
  namespace: scrimfinder
spec:
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      db: detail-filling-service-redis
  template:
    metadata:
      name: detail-filling-service-redis-pod
      namespace: scrimfinder
      labels:
        db: detail-filling-service-redis
    spec:
      containers:
        - name: detail-filling-service-redis
          image: redis:7
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "5Gi"
              cpu: "50m"
            limits:
              memory: "6Gi"
              cpu: "100m"
          livenessProbe:
            tcpSocket:
              port: 6379
            failureThreshold: 2
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: "/data"
              name: detail-filling-service-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: detail-filling-service-data
  namespace: scrimfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: detail-filling-service-redis-service
  namespace: scrimfinder
spec:
  clusterIP: None
  selector:
    db: detail-filling-service-redis-service
  ports:
    - protocol: TCP
      port: 6379
  type: ClusterIP
      