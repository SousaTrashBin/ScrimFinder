apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ranking-service-postgres
  namespace: scrimfinder
spec:
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      db: ranking-service-postgres
  template:
    metadata:
      name: matchmaking-service-postgres-pod
      namespace: scrimfinder
      labels:
        db: ranking-service-postgres
    spec:
      containers:
        - name: matchmaking-service-postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: [ "pg_isready", "-U", "postgres" ]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: [ "pg_isready", "-U", "postgres" ]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 10
          envFrom:
            - configMapRef:
                name: ranking-service-postgres-config
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - mountPath: "/var/lib/postgresql/data"
              name: ranking-service-volume
            - mountPath: "/docker-entrypoint-initdb.d/"
              name: ranking-service-postgres-init-script
      volumes:
        - name: ranking-service-volume
          persistentVolumeClaim:
            claimName: ranking-service-data
        - name: ranking-service-postgres-init-script
          configMap:
            name: ranking-service-postgres-init-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ranking-service-data
  namespace: scrimfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranking-service-postgres-init-config
  namespace: scrimfinder
data:
  init-db.sql: |
    CREATE DATABASE ranking;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ranking-service-postgres-config
  namespace: scrimfinder
data:
  PGDATA: "/var/lib/postgresql/data/pgdata"
---
apiVersion: v1
kind: Service
metadata:
  name: ranking-service-postgres
  namespace: scrimfinder
spec:
  clusterIP: None
  selector:
    db: ranking-service-postgres
  ports:
    - protocol: TCP
      port: 5432
  type: ClusterIP
