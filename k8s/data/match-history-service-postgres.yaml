apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: match-history-service-postgres
  namespace: scrimfinder
spec:
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      db: match-history-service-postgres
  template:
    metadata:
      name: match-history-service-postgres-pod
      namespace: scrimfinder
      labels:
        db: match-history-service-postgres
    spec:
      containers:
        - name: match-history-service-postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: "15Gi"
              cpu: "700m"
            limits:
              memory: "20Gi"
              cpu: "900m"
          livenessProbe:
            exec:
              command: [ "pg_isready", "-U", "postgres" ]
            failureThreshold: 2
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: [ "pg_isready", "-U", "postgres" ]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: "/data"
              name: match-history-service-data
            - mountPath: "/docker-entrypoint-initdb.d/"
              name: match-history-service-postgres-init-script
      volumes:
        - name: match-history-service-postgres-init-script
          configMap:
            name: match-history-service-postgres-init-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: match-history-service-data
  namespace: scrimfinder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 15Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: match-history-service-postgres-init-config
  namespace: scrimfinder
data:
  init-db.sql: |
    CREATE DATABASE history;
---
apiVersion: v1
kind: Service
metadata:
  name: match-history-service-postgres-service
  namespace: scrimfinder
spec:
  clusterIP: None
  selector:
    db: match-history-service-postgres-service
  ports:
    - protocol: TCP
      port: 5432
  type: ClusterIP
  