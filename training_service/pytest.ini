[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -p no:warnings
markers =
    unit: isolated tests with no external dependencies (DB, network)
    integration: small integration tests with local or mocked dependencies
    integration_large: large integration tests requiring external services (Postgres, Redis)
    acceptance: end-to-end flows and public contract checks
    slow: long-running tests

