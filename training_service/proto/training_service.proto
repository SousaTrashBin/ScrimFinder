syntax = "proto3";

package fc.ul.scrimfinder.grpc;

option java_multiple_files = true;
option java_package = "fc.ul.scrimfinder.grpc";
option java_outer_classname = "AnalysisProto";

// ── Training Service ──────────────────────────────────────────
// Exposed by training_service, called by:
//   - match_history_service (ForwardMatch)

service TrainingService {

  // Called by match_history_service after a match is saved.
  // Training Service fetches raw JSON from detail_filling_service
  // and stores + extracts features automatically.
  rpc ForwardMatch (ForwardMatchRequest) returns (ForwardMatchResponse) {}

  // Called by analysis_service to check Training Service health.
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse) {}
}

// ── ForwardMatch ──────────────────────────────────────────────

message ForwardMatchRequest {
  string match_id = 1;         // Riot match ID e.g. "EUW1_7123456789"
  string source   = 2;         // "matchmaking" | "manual" | "riot_api"
}

message ForwardMatchResponse {
  bool   success     = 1;
  string message     = 2;
  string game_id     = 3;      // internal game ID stored by training_service
  bool   draft_ok    = 4;      // draft features extracted successfully
  bool   build_ok    = 5;      // build features extracted successfully
  bool   perf_ok     = 6;      // performance features extracted successfully
}

// ── HealthCheck ───────────────────────────────────────────────

message HealthCheckRequest {}

message HealthCheckResponse {
  bool   healthy          = 1;
  string message          = 2;
  int32  games_ingested   = 3;
  repeated string active_models = 4;  // list of concerns with active models
}
