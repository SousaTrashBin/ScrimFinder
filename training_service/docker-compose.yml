services:
  ml-db:
    image: postgres:15
    container_name: scrimfinder_ml_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ml
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ml" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scrimfinder_net

  training:
    build: .
    container_name: scrimfinder_training
    command: uvicorn training_service.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - ../ml_data:/app/data
      - ../dataset:/app/dataset:ro
    environment:
      - PYTHONPATH=/app
      - LEAGUE_DB=/app/dataset/league_data.db
      - PLATFORM_DB_DSN=postgresql://postgres:postgres@ml-db:5432/ml
      - MODELS_DIR=/app/data/models
      - GAMES_DIR=/app/data/games
      - DATASETS_DIR=/app/data/datasets
      - MODEL_RELOAD_INTERVAL=60
      - GRPC_PORT=50051
    depends_on:
      ml-db:
        condition: service_healthy
    networks:
      - scrimfinder_net

networks:
  scrimfinder_net:
    external: true
