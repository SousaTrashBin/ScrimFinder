services:
  traefik:
    image: traefik:v3.6.2
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  matchmaking-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: matchmaking
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d matchmaking" ]
      interval: 5s
      timeout: 5s
      retries: 5
  
  ranking-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ranking
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ranking" ]
      interval: 5s
      timeout: 5s
      retries: 5

  history-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: history
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d history" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  matchmaking-service:
    build:
      context: matchmaking-service
      dockerfile: Dockerfile
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://matchmaking-db:5432/matchmaking
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      RANKING_SERVICE_URL: http://ranking-service:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.matchmaking.rule=PathPrefix(`/api/v1/matchmaking`)"
      - "traefik.http.services.matchmaking.loadbalancer.server.port=8080"
    depends_on:
      matchmaking-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ranking-service:
    build:
      context: ./ranking_service
      dockerfile: Dockerfile
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://ranking-db:5432/ranking
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      DETAIL_FILLING_SERVICE_URL: http://detail-filling-service:8080
      MATCH_HISTORY_SERVICE_URL: http://match-history-service:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ranking.rule=PathPrefix(`/api/v1/ranking`)"
      - "traefik.http.services.ranking.loadbalancer.server.port=8080"
    depends_on:
      ranking-db:
        condition: service_healthy

  match-history-service:
    build:
      context: ./match_history_service
      dockerfile: Dockerfile
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://history-db:5432/history
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      DB_URL: jdbc:postgresql://history-db:5432/history
      DB_USER: postgres
      DB_PASSWORD: postgres
      DETAIL_FILLING_SERVICE_URL: http://detail-filling-service:8080
      ANALYSIS_SERVICE_URL: http://analysis-service:8001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.history.rule=PathPrefix(`/api/v1/history`)"
      - "traefik.http.services.history.loadbalancer.server.port=8080"
    depends_on:
      history-db:
        condition: service_healthy

  detail-filling-service:
    build:
      context: ./detail_filling_service
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      RIOT_API_KEY: "${RIOT_API_KEY}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filling.rule=PathPrefix(`/api/v1/riot`)"
      - "traefik.http.services.filling.loadbalancer.server.port=8080"
    depends_on:
      redis:
        condition: service_healthy


  jwt-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jwt_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jwt_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  jwt-manager:
    build:
      context: ./jwt_manager
      dockerfile: Dockerfile
    command: uvicorn jwt_manager.main:app --host 0.0.0.0 --port 8002
    environment:
      - PYTHONPATH=/app
      - JWT_DB_HOST=jwt-db
      - JWT_DB_PORT=5432
      - JWT_DB_NAME=jwt_manager
      - JWT_DB_USER=postgres
      - JWT_DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/2
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - JWT_ISSUER=scrimfinder/jwt-manager
      - JWT_KEY_ID=scrimfinder-key-v1
      # RS256 keys: leave empty for dev (throwaway pair generated at startup)
      - JWT_PRIVATE_KEY=
      - JWT_PUBLIC_KEY=
      - ACCESS_TOKEN_TTL_SECONDS=3600
      - REFRESH_TOKEN_TTL_SECONDS=604800
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jwt.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.services.jwt.loadbalancer.server.port=8002"
    depends_on:
      jwt-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  training-service:
    build:
      context: ./training_service
      dockerfile: Dockerfile
    command: uvicorn training_service.main:app --host 0.0.0.0 --port 8000
    environment:
      - PYTHONPATH=/app
      - LEAGUE_DB=/app/dataset/league_data.db
      - PLATFORM_DB_DSN=host=platform-db port=5432 dbname=platform user=postgres password=postgres
      - MODELS_DIR=/app/ml_data/models
      - GAMES_DIR=/app/ml_data/games
      - DATASETS_DIR=/app/ml_data/datasets
      - MODEL_RELOAD_INTERVAL=60
      - GRPC_PORT=50051
      - DETAIL_FILLING_URL=http://detail-filling-service:8080/api/v1/riot
    volumes:
      - ./ml_data:/app/ml_data
      - ./dataset:/app/dataset:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.training.rule=PathPrefix(`/api/v1/training`)"
      - "traefik.http.services.training.loadbalancer.server.port=8000"
    depends_on:
      platform-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      detail-filling-service:
        condition: service_started

  analysis-service:
    build:
      context: ./analysis_service
      dockerfile: Dockerfile
    command: uvicorn analysis_service.main:app --host 0.0.0.0 --port 8001
    environment:
      - PYTHONPATH=/app
      - LEAGUE_DB=/app/dataset/league_data.db
      - PLATFORM_DB_DSN=host=platform-db port=5432 dbname=platform user=postgres password=postgres
      - MODELS_DIR=/app/ml_data/models
      - MODEL_RELOAD_INTERVAL=60
      - TRAINING_GRPC_URL=training-service:50051
    volumes:
      - ./ml_data:/app/ml_data
      - ./dataset:/app/dataset:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analysis.rule=PathPrefix(`/api/v1/analysis`)"
      - "traefik.http.services.analysis.loadbalancer.server.port=8001"
    depends_on:
      - training-service