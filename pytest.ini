[pytest]
testpaths =
    jwt_manager/tests
    analysis_service/tests
    training_service/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:warnings
markers =
    unit: isolated tests with no service wiring
    integration: service/API tests with mocked or ephemeral dependencies
    acceptance: public contract and health checks
    slow: long-running training jobs
    requires_db: requires an external database
