quarkus.log.level=INFO
quarkus.log.min-level=INFO
quarkus.shutdown.delay-enabled=true
quarkus.shutdown.delay=3

quarkus.http.root-path=/api/v1/riot
quarkus.http.port=${HTTP_PORT:8080}

config.riot-api-key=${RIOT_API_KEY:default_value}
quarkus.rest-client.riot-match-api.url=${RIOT_MATCH_SERVICE_URL:localhost:8081}
quarkus.rest-client.riot-account-api.url=${RIOT_ACCOUNT_SERVICE_URL:http://localhost:8082}
quarkus.rest-client.riot-region-api.url=${RIOT_REGION_SERVICE_URL:http://localhost:8083}
quarkus.rest-client.riot-summoner-api.url=${RIOT_SUMMONER_SERVICE_URL:localhost:8084}
quarkus.rest-client.riot-player-api.url=${RIOT_PLAYER_SERVICE_URL:localhost:8085}

quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
config.redis-cache-key-ttl=900

quarkus.swagger-ui.always-include=true
quarkus.openapi.always-include=true
