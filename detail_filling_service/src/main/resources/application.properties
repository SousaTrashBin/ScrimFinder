quarkus.log.level=INFO
quarkus.log.min-level=INFO
quarkus.shutdown.delay-enabled=true
quarkus.shutdown.delay=3000
quarkus.http.port=${HTTP_PORT:8080}
config.riot-api-key=${RIOT_API_KEY:default_value}
config.riot-api-region=europe
config.riot-api-subregion=EUW1
quarkus.rest-client.riot-match-api.url=${RIOT_MATCH_SERVICE_URL:http://localhost:8081}
quarkus.rest-client.riot-account-api.url=${RIOT_ACCOUNT_SERVICE_URL:http://localhost:8082}
quarkus.rest-client.riot-summoner-api.url=${RIOT_SUMMONER_SERVICE_URL:http://localhost:8083}
quarkus.rest-client.riot-player-api.url=${RIOT_PLAYER_SERVICE_URL:http://localhost:8084}
