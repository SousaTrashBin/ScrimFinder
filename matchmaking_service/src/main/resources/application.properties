ranking-service-api/mp-rest/url=${RANKING_SERVICE_URL:http://localhost:8081}

quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/matchmaking}
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.http.port=${HTTP_PORT:8080}
quarkus.http.root-path=/api/v1/matchmaking

quarkus.grpc.clients.player-service.host=detail-filling-service
quarkus.grpc.clients.player-service.port=9000

quarkus.grpc.clients.ranking-service.host=ranking-service
quarkus.grpc.clients.ranking-service.port=9001

quarkus.swagger-ui.always-include=true
quarkus.openapi.always-include=true

