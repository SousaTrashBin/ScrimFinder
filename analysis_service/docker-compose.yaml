# All services share /app/models so trained .pkl files and the
# SQLite registry DB are visible to every container.
# The dataset folder sits one level above this file (next to analysis_service/).
volumes:
  model_store:

services:

  # ── Training Service ───────────────────────────────────────
  training:
    build: .
    container_name: lol_training
    command: uvicorn training.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - model_store:/app/models
      - ../dataset:/app/dataset:ro
    environment:
      - MODELS_DIR=/app/models
      - MODEL_REGISTRY_DB=/app/models/registry.db
      - MODEL_RELOAD_INTERVAL=600
      - LEAGUE_DB=/app/dataset/league_data.db

  # ── Draft Analysis Service ──────────────────────────────────
  draft:
    build: .
    container_name: lol_draft
    command: uvicorn services.draft.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - model_store:/app/models
    environment:
      - MODEL_REGISTRY_DB=/app/models/registry.db
      - MODEL_RELOAD_INTERVAL=600
    depends_on:
      - training

  # ── Build Analysis Service ──────────────────────────────────
  build_svc:
    build: .
    container_name: lol_build
    command: uvicorn services.build.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    volumes:
      - model_store:/app/models
    environment:
      - MODEL_REGISTRY_DB=/app/models/registry.db
      - MODEL_RELOAD_INTERVAL=600
    depends_on:
      - training

  # ── Performance Analysis Service ────────────────────────────
  performance:
    build: .
    container_name: lol_performance
    command: uvicorn services.performance.main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    volumes:
      - model_store:/app/models
    environment:
      - MODEL_REGISTRY_DB=/app/models/registry.db
      - MODEL_RELOAD_INTERVAL=600
    depends_on:
      - training