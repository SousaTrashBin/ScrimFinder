<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Draft Analysis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080c14;font-family:'Rajdhani',sans-serif;color:#fff}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scanline{0%{top:-2px}100%{top:100vh}}
    input,select{outline:none;font-family:'Rajdhani',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

const ROLES = ["TOP","JUNGLE","MID","BOT","SUPPORT"];
const ACCENT = "#3b82f6";
const TEAM_A_COLOR = "#3b82f6";
const TEAM_B_COLOR = "#ef4444";

const PLACEHOLDER_CHAMPS = {
  TOP:"Malphite",JUNGLE:"Amumu",MID:"Orianna",BOT:"Jinx",SUPPORT:"Lulu"
};
const PLACEHOLDER_B = {
  TOP:"Fiora",JUNGLE:"Vi",MID:"Zed",BOT:"Caitlyn",SUPPORT:"Thresh"
};

function ChampionInput({role,value,onChange,color}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
      background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8}}>
      <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.35)",
        width:60,flexShrink:0,letterSpacing:"0.08em"}}>{role}</span>
      <input value={value} onChange={e=>onChange(role,e.target.value)}
        placeholder={`e.g. ${role==="TOP"?"Malphite":"Jinx"}`}
        style={{flex:1,background:"transparent",border:"none",color:"#fff",
          fontSize:14,fontWeight:700}}/>
    </div>
  );
}

function WinBar({probA,probB}){
  const pA=Math.round(probA*100);
  const pB=Math.round(probB*100);
  return(
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:TEAM_A_COLOR}}>{pA}%</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"rgba(255,255,255,0.3)",alignSelf:"center",letterSpacing:"0.1em"}}>WIN PROBABILITY</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:TEAM_B_COLOR}}>{pB}%</span>
      </div>
      <div style={{height:10,borderRadius:5,overflow:"hidden",display:"flex"}}>
        <div style={{width:`${pA}%`,background:TEAM_A_COLOR,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
        <div style={{flex:1,background:TEAM_B_COLOR,transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:TEAM_A_COLOR,letterSpacing:"0.1em"}}>TEAM A</span>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:TEAM_B_COLOR,letterSpacing:"0.1em"}}>TEAM B</span>
      </div>
    </div>
  );
}

function TagList({items,color}){
  if(!items||items.length===0)return<span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.2)"}}>None identified</span>;
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
      {items.map((t,i)=>(
        <span key={i} style={{padding:"4px 10px",background:`${color}15`,border:`1px solid ${color}33`,
          borderRadius:20,fontSize:11,color,fontWeight:500}}>{t}</span>
      ))}
    </div>
  );
}

function Dashboard(){
  const [apiUrl,setApiUrl] = useState("http://localhost:8001");
  const [ok,setOk]         = useState(null);
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const [error,setError]   = useState(null);
  const [teamA,setTeamA]   = useState({TOP:"Malphite",JUNGLE:"Amumu",MID:"Orianna",BOT:"Jinx",SUPPORT:"Lulu"});
  const [teamB,setTeamB]   = useState({TOP:"Fiora",JUNGLE:"Vi",MID:"Zed",BOT:"Caitlyn",SUPPORT:"Thresh"});

  const setChamp=(team,role,val)=>{
    if(team==="A")setTeamA(t=>({...t,[role]:val}));
    else setTeamB(t=>({...t,[role]:val}));
  };

  const ping=async()=>{
    try{const r=await fetch(`${apiUrl}/health`);setOk(r.ok);}catch{setOk(false);}
  };

  React.useEffect(()=>{ping();},[apiUrl]);

  const analyze=async()=>{
    setLoading(true);setError(null);setResult(null);
    const roleMap={TOP:"TOP",JUNGLE:"JUNGLE",MID:"MID",BOT:"BOT",SUPPORT:"SUPPORT"};
    const body={
      teamA:{champions:ROLES.map(r=>({name:teamA[r],role:roleMap[r]}))},
      teamB:{champions:ROLES.map(r=>({name:teamB[r],role:roleMap[r]}))},
    };
    try{
      const r=await fetch(`${apiUrl}/analysis/draft`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const d=await r.json();
      if(!r.ok)setError(d.detail||"Request failed");
      else setResult(d);
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#080c14",padding:"40px 24px",position:"relative",overflowX:"hidden"}}>
      <div style={{position:"fixed",left:0,right:0,height:2,pointerEvents:"none",zIndex:99,
        background:`linear-gradient(90deg,transparent,${ACCENT}33,transparent)`,animation:"scanline 7s linear infinite"}}/>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",
        backgroundImage:`linear-gradient(${ACCENT}18 1px,transparent 1px),linear-gradient(90deg,${ACCENT}18 1px,transparent 1px)`,
        backgroundSize:"40px 40px"}}/>

      <div style={{maxWidth:900,margin:"0 auto"}}>
        <div style={{marginBottom:32}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:ACCENT,letterSpacing:"0.22em",marginBottom:8,textTransform:"uppercase"}}>ScrimFinder // Draft Analysis · Port 8001</div>
          <h1 style={{fontSize:"clamp(26px,5vw,40px)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em",lineHeight:1}}>
            Draft <span style={{color:ACCENT}}>Analyser</span>
          </h1>
          <div style={{display:"flex",alignItems:"center",gap:16,marginTop:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,fontFamily:"'Space Mono',monospace",fontSize:11,
              color:ok===null?"#666":ok?"#00ff9d":"#ff4d4d"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:ok===null?"#666":ok?"#00ff9d":"#ff4d4d",animation:ok?"pulse 2s infinite":"none"}}/>
              {ok===null?"Connecting…":ok?"Connected":"Disconnected"}
            </div>
            <input value={apiUrl} onChange={e=>{setApiUrl(e.target.value);}} style={{
              background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",
              borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,0.45)",
              fontFamily:"'Space Mono',monospace",fontSize:11,width:220}}/>
          </div>
        </div>

        {/* Team inputs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
          {["A","B"].map(team=>(
            <div key={team} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${team==="A"?TEAM_A_COLOR+"33":TEAM_B_COLOR+"33"}`,borderRadius:12,padding:20}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:"0.12em",
                color:team==="A"?TEAM_A_COLOR:TEAM_B_COLOR,textTransform:"uppercase",marginBottom:14}}>⬡ Team {team}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {ROLES.map(r=>(
                  <ChampionInput key={r} role={r}
                    value={team==="A"?teamA[r]:teamB[r]}
                    onChange={(_,v)=>setChamp(team,r,v)}
                    color={team==="A"?TEAM_A_COLOR:TEAM_B_COLOR}/>
                ))}
              </div>
            </div>
          ))}
        </div>

        <button onClick={analyze} disabled={loading} style={{
          width:"100%",padding:"14px",marginBottom:28,
          background:loading?"rgba(255,255,255,0.03)":`linear-gradient(135deg,${ACCENT}30,${ACCENT}15)`,
          border:`1px solid ${ACCENT}55`,borderRadius:10,color:loading?"rgba(255,255,255,0.3)":ACCENT,
          fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",
          cursor:loading?"not-allowed":"pointer",transition:"all .2s"}}>
          {loading?"Analysing…":"▶ Analyse Draft"}
        </button>

        {error&&<div style={{marginBottom:20,padding:"12px 16px",background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:8,fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ff9999"}}>{error}</div>}

        {result&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <WinBar probA={result.teamAWinProbability} probB={result.teamBWinProbability}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              {[["A",result.teamASynergies,result.teamACounters,TEAM_A_COLOR],["B",result.teamBSynergies,result.teamBCounters,TEAM_B_COLOR]].map(([team,syn,ctr,color])=>(
                <div key={team} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${color}22`,borderRadius:12,padding:18}}>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,color,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Team {team}</div>
                  <div style={{marginBottom:12}}>
                    <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:6}}>SYNERGIES</div>
                    <TagList items={syn} color={color}/>
                  </div>
                  <div>
                    <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:6}}>COUNTERS</div>
                    <TagList items={ctr} color="#facc15"/>
                  </div>
                </div>
              ))}
            </div>
            {result.tips&&result.tips.length>0&&(
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:18}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:10}}>TIPS</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {result.tips.map((t,i)=><div key={i} style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>→ {t}</div>)}
                </div>
              </div>
            )}
            <div style={{marginTop:12,fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.2)",textAlign:"right"}}>Model: {result.modelVersion??"—"}</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
