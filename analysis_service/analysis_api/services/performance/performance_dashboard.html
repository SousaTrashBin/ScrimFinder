<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Performance Analysis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0c10;font-family:'Rajdhani',sans-serif;color:#fff}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scanline{0%{top:-2px}100%{top:100vh}}
    input,select{outline:none;font-family:'Rajdhani',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;
const ACCENT = "#a78bfa";

function PercentileBar({label,value,percentile,tierAvg,color}){
  const pct=Math.min(percentile,100);
  const barColor=pct>=75?"#00ff9d":pct>=50?color:pct>=25?"#facc15":"#ff4d4d";
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em"}}>{label.toUpperCase()}</span>
        <div style={{display:"flex",gap:12,alignItems:"baseline"}}>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.25)"}}>avg {tierAvg?.toFixed?.(1)??tierAvg}</span>
          <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:barColor}}>{value?.toFixed?.(1)??value}</span>
        </div>
      </div>
      <div style={{position:"relative",height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${pct}%`,
          background:`linear-gradient(90deg,${barColor}77,${barColor})`,borderRadius:3,
          transition:"width .5s cubic-bezier(.4,0,.2,1)"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:3}}>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:barColor}}>p{Math.round(pct)}</span>
      </div>
    </div>
  );
}

function ImpactDot({impact}){
  const c={LOW:"#888",MEDIUM:"#facc15",HIGH:"#ff6b35"}[impact]??"#888";
  return<span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:c,marginRight:6,verticalAlign:"middle"}}/>;
}

function Dashboard(){
  const [apiUrl,setApiUrl] = useState("http://localhost:8003");
  const [ok,setOk]         = useState(null);
  const [loading,setLoading] = useState(false);
  const [result,setResult] = useState(null);
  const [tips,setTips]     = useState(null);
  const [error,setError]   = useState(null);
  const [summonerId,setSummonerId] = useState("fc59850-RodrigoEUW");
  const [activeTab,setActiveTab] = useState("overview");

  React.useEffect(()=>{
    fetch(`${apiUrl}/health`).then(r=>setOk(r.ok)).catch(()=>setOk(false));
  },[apiUrl]);

  const fetchPerformance=async()=>{
    setLoading(true);setError(null);setResult(null);setTips(null);
    try{
      const [perfRes,tipsRes]=await Promise.all([
        fetch(`${apiUrl}/analysis/performance/${encodeURIComponent(summonerId)}`),
        fetch(`${apiUrl}/analysis/performance/${encodeURIComponent(summonerId)}/tips`),
      ]);
      const perf=await perfRes.json();
      const tipsData=await tipsRes.json();
      if(!perfRes.ok)setError(perf.detail||"Request failed");
      else{setResult(perf);setTips(tipsData);}
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const inputStyle={width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",
    borderRadius:8,padding:"10px 14px",color:"#fff",fontSize:14,fontWeight:700};

  const metrics=result?[
    {label:"KDA",     value:result.kda?.value,        tierAvg:result.kda?.tierAverage,        percentile:result.kda?.percentile},
    {label:"Damage",  value:result.avgDamageDealt?.value,  tierAvg:result.avgDamageDealt?.tierAverage,  percentile:result.avgDamageDealt?.percentile},
    {label:"Vision",  value:result.avgVisionScore?.value,  tierAvg:result.avgVisionScore?.tierAverage,  percentile:result.avgVisionScore?.percentile},
    {label:"Gold/min",value:result.avgGoldPerMinute?.value, tierAvg:result.avgGoldPerMinute?.tierAverage, percentile:result.avgGoldPerMinute?.percentile},
    {label:"Obj. Part.",value:result.objectiveParticipation?.value,tierAvg:result.objectiveParticipation?.tierAverage,percentile:result.objectiveParticipation?.percentile},
  ].filter(m=>m.value!=null):[];

  return(
    <div style={{minHeight:"100vh",background:"#0a0c10",padding:"40px 24px",position:"relative",overflowX:"hidden"}}>
      <div style={{position:"fixed",left:0,right:0,height:2,pointerEvents:"none",zIndex:99,
        background:`linear-gradient(90deg,transparent,${ACCENT}33,transparent)`,animation:"scanline 7s linear infinite"}}/>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",
        backgroundImage:`linear-gradient(${ACCENT}10 1px,transparent 1px),linear-gradient(90deg,${ACCENT}10 1px,transparent 1px)`,
        backgroundSize:"40px 40px"}}/>

      <div style={{maxWidth:760,margin:"0 auto"}}>
        <div style={{marginBottom:32}}>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:ACCENT,letterSpacing:"0.22em",marginBottom:8,textTransform:"uppercase"}}>ScrimFinder // Performance · Port 8003</div>
          <h1 style={{fontSize:"clamp(26px,5vw,40px)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em",lineHeight:1}}>
            Performance <span style={{color:ACCENT}}>Analysis</span>
          </h1>
          <div style={{display:"flex",alignItems:"center",gap:16,marginTop:12,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,fontFamily:"'Space Mono',monospace",fontSize:11,
              color:ok===null?"#666":ok?"#00ff9d":"#ff4d4d"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:ok===null?"#666":ok?"#00ff9d":"#ff4d4d",animation:ok?"pulse 2s infinite":"none"}}/>
              {ok===null?"Connecting…":ok?"Connected":"Disconnected"}
            </div>
            <input value={apiUrl} onChange={e=>setApiUrl(e.target.value)} style={{
              background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",
              borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,0.45)",
              fontFamily:"'Space Mono',monospace",fontSize:11,width:220}}/>
          </div>
        </div>

        <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,padding:20,marginBottom:20}}>
          <label style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:"0.12em",display:"block",marginBottom:8}}>SUMMONER ID</label>
          <div style={{display:"flex",gap:10}}>
            <input value={summonerId} onChange={e=>setSummonerId(e.target.value)} style={{...inputStyle}} placeholder="fc59850-RodrigoEUW"/>
            <button onClick={fetchPerformance} disabled={loading} style={{
              padding:"10px 20px",flexShrink:0,
              background:loading?"rgba(255,255,255,0.03)":`linear-gradient(135deg,${ACCENT}30,${ACCENT}15)`,
              border:`1px solid ${ACCENT}55`,borderRadius:8,color:loading?"rgba(255,255,255,0.3)":ACCENT,
              fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:"0.1em",
              cursor:loading?"not-allowed":"pointer",transition:"all .2s",whiteSpace:"nowrap"}}>
              {loading?"…":"▶ Fetch"}
            </button>
          </div>
        </div>

        {error&&<div style={{marginBottom:20,padding:"12px 16px",background:"rgba(255,77,77,0.08)",border:"1px solid rgba(255,77,77,0.2)",borderRadius:8,fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ff9999"}}>{error}</div>}

        {result&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            {/* Summary bar */}
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,padding:20,marginBottom:16,display:"flex",gap:24,flexWrap:"wrap"}}>
              {[
                {label:"WIN RATE",value:`${Math.round(result.winRate*100)}%`,color:"#00ff9d"},
                {label:"MATCHES",value:result.matchesAnalyzed,color:ACCENT},
                {label:"CHAMPION",value:result.champion??"—",color:"#facc15"},
                {label:"ROLE",value:result.role??"—",color:"rgba(255,255,255,0.6)"},
              ].map(({label,value,color})=>(
                <div key={label}>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:4}}>{label}</div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:700,color}}>{value}</div>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["overview","tips"].map(tab=>(
                <button key={tab} onClick={()=>setActiveTab(tab)} style={{
                  padding:"8px 16px",borderRadius:8,fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,
                  letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",transition:"all .2s",
                  background:activeTab===tab?`${ACCENT}20`:"rgba(255,255,255,0.03)",
                  border:`1px solid ${activeTab===tab?ACCENT+"55":"rgba(255,255,255,0.07)"}`,
                  color:activeTab===tab?ACCENT:"rgba(255,255,255,0.4)"}}>
                  {tab}
                </button>
              ))}
            </div>

            {activeTab==="overview"&&metrics.length>0&&(
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:12,padding:20}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:16}}>PERFORMANCE VS TIER AVERAGE</div>
                {metrics.map(m=><PercentileBar key={m.label} {...m} color={ACCENT}/>)}
              </div>
            )}

            {activeTab==="tips"&&tips&&(
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:12,padding:20}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",marginBottom:16}}>IMPROVEMENT TIPS</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {tips.tips?.map((tip,i)=>(
                    <div key={i} style={{padding:"12px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <ImpactDot impact={tip.impact}/>
                        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.35)",letterSpacing:"0.08em"}}>{tip.category?.replace("_"," ")}</span>
                        <span style={{fontFamily:"'Space Mono',monospace",fontSize:8,padding:"2px 6px",background:"rgba(255,255,255,0.05)",borderRadius:4,color:"rgba(255,255,255,0.3)",marginLeft:"auto"}}>{tip.impact}</span>
                      </div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>{tip.tip}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{marginTop:12,fontFamily:"'Space Mono',monospace",fontSize:9,color:"rgba(255,255,255,0.2)",textAlign:"right"}}>Model: {result.modelVersion??"—"}</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
