<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrimFinder — Training Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #090b10; }
    @keyframes shimmer { 0% { left: -60px; } 100% { left: 110%; } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scanline { 0% { top:-2px; } 100% { top:100vh; } }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#0d0f15; }
    ::-webkit-scrollbar-thumb { background:#1e2330; border-radius:3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONCERNS = ["draft", "build", "performance"];
    const META = {
      draft:       { label: "Draft Model",       icon: "⚔️",  color: "#00ff9d" },
      build:       { label: "Build Model",        icon: "🛡️",  color: "#ff6b35" },
      performance: { label: "Performance Model",  icon: "📊",  color: "#a78bfa" },
    };
    const STATUS_COLOR = {
      IDLE: "#444", PENDING: "#666", RUNNING: "#facc15",
      COMPLETED: "#00ff9d", FAILED: "#ff4d4d",
    };

    /* ── Progress bar ─────────────────────────────────────── */
    function Bar({ progress, color, status }) {
      return (
        <div style={{ position:"relative", height:6, background:"rgba(255,255,255,0.07)", borderRadius:3, overflow:"hidden" }}>
          <div style={{
            position:"absolute", left:0, top:0, bottom:0,
            width:`${progress}%`,
            background: status==="FAILED" ? "#ff4d4d" : `linear-gradient(90deg,${color}77,${color})`,
            borderRadius:3,
            transition:"width .5s cubic-bezier(.4,0,.2,1)",
            boxShadow: status==="RUNNING" ? `0 0 10px ${color}55` : "none",
          }}/>
          {status==="RUNNING" && (
            <div style={{
              position:"absolute", top:0, bottom:0, width:60,
              background:`linear-gradient(90deg,transparent,${color}55,transparent)`,
              animation:"shimmer 1.4s infinite",
            }}/>
          )}
        </div>
      );
    }

    /* ── Single job card ──────────────────────────────────── */
    function Card({ concern, job, onTrigger, busy }) {
      const m = META[concern];
      const status  = job?.status  ?? "IDLE";
      const progress= job?.progress ?? 0;
      const stage   = job?.stage   ?? "Not started";
      const running = status === "RUNNING";
      const sc = STATUS_COLOR[status] ?? "#888";

      return (
        <div style={{
          background:"rgba(255,255,255,0.03)",
          border:`1px solid ${running ? m.color+"33" : "rgba(255,255,255,0.07)"}`,
          borderRadius:14, padding:24,
          transition:"border-color .4s",
          position:"relative", overflow:"hidden",
          animation:"fadeIn .4s ease both",
        }}>
          {running && (
            <div style={{
              position:"absolute", top:-50, right:-50,
              width:130, height:130,
              background:`radial-gradient(circle,${m.color}14 0%,transparent 70%)`,
              pointerEvents:"none",
            }}/>
          )}

          {/* Header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18 }}>
            <div style={{ display:"flex", alignItems:"center", gap:9 }}>
              <span style={{ fontSize:19 }}>{m.icon}</span>
              <span style={{
                fontFamily:"'Space Mono',monospace", fontSize:12, fontWeight:700,
                letterSpacing:"0.08em", color:"#fff", textTransform:"uppercase",
              }}>{m.label}</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6, fontFamily:"'Space Mono',monospace", fontSize:10, color:sc, letterSpacing:"0.1em" }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:sc, animation:running?"pulse 1s infinite":"none" }}/>
              {status}
            </div>
          </div>

          {/* Progress */}
          <div style={{ marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:7 }}>
              <span style={{
                fontFamily:"'Space Mono',monospace", fontSize:10,
                color:"rgba(255,255,255,0.35)", letterSpacing:"0.04em",
                maxWidth:"78%", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
              }}>{stage}</span>
              <span style={{ fontFamily:"'Space Mono',monospace", fontSize:13, fontWeight:700, color:m.color }}>
                {job ? `${progress}%` : "—"}
              </span>
            </div>
            <Bar progress={progress} color={m.color} status={status}/>
          </div>

          {/* Metrics */}
          {status==="COMPLETED" && job.metrics && (
            <div style={{
              display:"flex", gap:10, flexWrap:"wrap",
              marginTop:14, paddingTop:14,
              borderTop:"1px solid rgba(255,255,255,0.05)",
            }}>
              {Object.entries(job.metrics)
                .filter(([k])=>["accuracy","f1_weighted","roc_auc"].includes(k))
                .map(([k,v])=>(
                  <div key={k} style={{ background:"rgba(255,255,255,0.05)", borderRadius:7, padding:"6px 11px" }}>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"rgba(255,255,255,0.35)", letterSpacing:"0.1em", marginBottom:2 }}>
                      {k.replace("_"," ").toUpperCase()}
                    </div>
                    <div style={{ fontFamily:"'Space Mono',monospace", fontSize:15, fontWeight:700, color:m.color }}>
                      {(v*100).toFixed(1)}%
                    </div>
                  </div>
                ))}
            </div>
          )}

          {/* Error */}
          {status==="FAILED" && job?.error && (
            <div style={{
              marginTop:12, padding:"9px 12px",
              background:"rgba(255,77,77,0.08)", border:"1px solid rgba(255,77,77,0.2)",
              borderRadius:7, fontFamily:"'Space Mono',monospace", fontSize:10, color:"#ff9999",
            }}>{job.error}</div>
          )}

          {/* Button */}
          <button onClick={()=>onTrigger(concern)} disabled={busy||running} style={{
            marginTop:18, width:"100%", padding:"10px 0",
            background: running ? "rgba(255,255,255,0.03)" : `linear-gradient(135deg,${m.color}20,${m.color}0d)`,
            border:`1px solid ${running?"rgba(255,255,255,0.07)":m.color+"44"}`,
            borderRadius:8,
            color: running ? "rgba(255,255,255,0.25)" : m.color,
            fontFamily:"'Space Mono',monospace", fontSize:10, fontWeight:700,
            letterSpacing:"0.12em", textTransform:"uppercase",
            cursor: running||busy ? "not-allowed" : "pointer",
            transition:"all .2s",
          }}>
            {running ? "Training…" : status==="COMPLETED" ? "↺  Retrain" : "▶  Train"}
          </button>
        </div>
      );
    }

    /* ── Main dashboard ───────────────────────────────────── */
    function Dashboard() {
      const [jobs,    setJobs]    = useState({});
      const [apiUrl,  setApiUrl]  = useState("http://localhost:8000");
      const [ok,      setOk]      = useState(null);
      const [lastPoll,setLastPoll]= useState(null);
      const [busy,    setBusy]    = useState(false);
      const ref = useRef();

      const poll = async () => {
        try {
          const r = await fetch(`${apiUrl}/train/jobs`);
          if (!r.ok) throw new Error();
          const d = await r.json();
          setOk(true); setLastPoll(new Date());
          const latest = {};
          for (const j of d.jobs) {
            if (!latest[j.concern] || j.createdAt > latest[j.concern].createdAt)
              latest[j.concern] = j;
          }
          setJobs(latest);
        } catch { setOk(false); }
      };

      useEffect(()=>{ poll(); ref.current=setInterval(poll,2000); return()=>clearInterval(ref.current); },[apiUrl]);

      const triggerAll = async () => {
        setBusy(true);
        await fetch(`${apiUrl}/train/trigger?concern=all`,{method:"POST"}).catch(()=>{});
        setTimeout(poll,300); setBusy(false);
      };
      const triggerOne = async (c) => {
        setBusy(true);
        await fetch(`${apiUrl}/train/trigger?concern=${c}`,{method:"POST"}).catch(()=>{});
        setTimeout(poll,300); setBusy(false);
      };

      const anyRunning = Object.values(jobs).some(j=>j.status==="RUNNING");
      const allDone    = CONCERNS.every(c=>jobs[c]?.status==="COMPLETED");

      return (
        <div style={{
          minHeight:"100vh", background:"#090b10",
          fontFamily:"'Rajdhani',sans-serif", color:"#fff",
          padding:"40px 24px", position:"relative", overflowX:"hidden",
        }}>
          {/* Scanline */}
          <div style={{
            position:"fixed", left:0, right:0, height:2, pointerEvents:"none", zIndex:99,
            background:"linear-gradient(90deg,transparent,rgba(0,255,157,0.12),transparent)",
            animation:"scanline 7s linear infinite",
          }}/>
          {/* Grid */}
          <div style={{
            position:"fixed", inset:0, pointerEvents:"none",
            backgroundImage:"linear-gradient(rgba(0,255,157,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,157,0.025) 1px,transparent 1px)",
            backgroundSize:"40px 40px",
          }}/>

          <div style={{ maxWidth:900, margin:"0 auto" }}>

            {/* Header */}
            <div style={{ marginBottom:36 }}>
              <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#00ff9d", letterSpacing:"0.22em", marginBottom:8, textTransform:"uppercase" }}>
                ScrimFinder // Analysis Service
              </div>
              <h1 style={{ fontSize:"clamp(26px,5vw,42px)", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.04em", lineHeight:1 }}>
                Model Training <span style={{ color:"#00ff9d" }}>Dashboard</span>
              </h1>

              {/* Status row */}
              <div style={{ display:"flex", alignItems:"center", gap:16, marginTop:14, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:7, fontFamily:"'Space Mono',monospace", fontSize:11,
                  color: ok===null?"#666" : ok?"#00ff9d":"#ff4d4d" }}>
                  <div style={{ width:7,height:7,borderRadius:"50%",
                    background:ok===null?"#666":ok?"#00ff9d":"#ff4d4d",
                    animation:ok?"pulse 2s infinite":"none" }}/>
                  {ok===null?"Connecting…":ok?"Connected":"Disconnected — is Docker running?"}
                </div>
                {lastPoll && (
                  <span style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"rgba(255,255,255,0.22)" }}>
                    Last poll {lastPoll.toLocaleTimeString()}
                  </span>
                )}
                <input value={apiUrl} onChange={e=>setApiUrl(e.target.value)} style={{
                  background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.09)",
                  borderRadius:6, padding:"4px 10px", color:"rgba(255,255,255,0.45)",
                  fontFamily:"'Space Mono',monospace", fontSize:11, width:220,
                }}/>
              </div>
            </div>

            {/* Train All */}
            <button onClick={triggerAll} disabled={busy||anyRunning} style={{
              marginBottom:28, padding:"13px 30px",
              background: anyRunning ? "rgba(255,255,255,0.03)" : "linear-gradient(135deg,rgba(0,255,157,0.18),rgba(0,255,157,0.07))",
              border:`1px solid ${anyRunning?"rgba(255,255,255,0.07)":"rgba(0,255,157,0.38)"}`,
              borderRadius:10, color:anyRunning?"rgba(255,255,255,0.25)":"#00ff9d",
              fontFamily:"'Space Mono',monospace", fontSize:11, fontWeight:700,
              letterSpacing:"0.14em", textTransform:"uppercase",
              cursor:anyRunning||busy?"not-allowed":"pointer", transition:"all .2s",
              display:"flex", alignItems:"center", gap:10,
            }}>
              {anyRunning
                ? <><span style={{animation:"pulse 1s infinite"}}>⬤</span> Training in progress…</>
                : allDone
                ? <>↺&nbsp;&nbsp;Retrain All Models</>
                : <>▶▶&nbsp;&nbsp;Train All Models</>}
            </button>

            {/* Cards */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))", gap:16 }}>
              {CONCERNS.map(c=>(
                <Card key={c} concern={c} job={jobs[c]??null} onTrigger={triggerOne} busy={busy}/>
              ))}
            </div>

            <div style={{ marginTop:36, fontFamily:"'Space Mono',monospace", fontSize:10, color:"rgba(255,255,255,0.18)", textAlign:"center", letterSpacing:"0.05em" }}>
              Polls every 2s &nbsp;·&nbsp; Analysis services hot-reload within 10 min of model activation
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
  </script>
</body>
</html>
