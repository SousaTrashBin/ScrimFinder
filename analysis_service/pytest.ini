[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -p no:warnings
markers =
    unit: isolated tests with no service wiring
    integration: service/API tests with mocked or ephemeral dependencies
    acceptance: public contract and health checks
    slow: real training jobs
    requires_db: needs LEAGUE_DB configured
