name: ScrimFinder CI

on:
  push:
    branches: [main, work/diogo, work/bruno, work/rodrigo]
  pull_request:

permissions:
  contents: read

# Cancel stale runs when new commits are pushed to a PR or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quarkus_build:
    name: Java build & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - matchmaking-service
          - ranking_service
          - match_history_service
          - detail_filling_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Ensure Maven wrapper is executable
        working-directory: ${{ matrix.service }}
        run: chmod +x ./mvnw

      - name: Check formatting
        working-directory: ${{ matrix.service }}
        run: ./mvnw spotless:check -B

      - name: Build and run tests
        working-directory: ${{ matrix.service }}
        run: ./mvnw clean package -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  python_build:
    name: Python lint & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - jwt_manager
          - analysis_service
          - training_service

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff pytest pytest-asyncio

      - name: Lint with Ruff (logic)
        run: ruff check ${{ matrix.service }}

      - name: Check formatting with Ruff
        run: ruff format --check ${{ matrix.service }}

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          JWT_DB_HOST: localhost
          JWT_DB_PORT: "5432"
          JWT_DB_NAME: testdb
          JWT_DB_USER: user
          JWT_DB_PASSWORD: pass
          REDIS_URL: redis://localhost:6379/2
          PLATFORM_DB_HOST: localhost
          PLATFORM_DB_PORT: "5432"
          PLATFORM_DB_NAME: testdb
          PLATFORM_DB_USER: user
          PLATFORM_DB_PASSWORD: pass
          MODELS_DIR: /tmp/models
          GAMES_DIR: /tmp/games
          DATASETS_DIR: /tmp/datasets
        run: |
          mkdir -p /tmp/models /tmp/games /tmp/datasets
          pytest ${{ matrix.service }} --junitxml=junit-${{ matrix.service }}.xml -v

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.service }}
          path: junit-${{ matrix.service }}.xml
          if-no-files-found: ignore
          retention-days: 7