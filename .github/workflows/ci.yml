name: ScrimFinder CI

on:
  push:
    branches: [ main, work/diogo, work/bruno, work/rodrigo ]

permissions:
  contents: read

jobs:
  quarkus_build:
    name: build & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [
          'matchmaking_service',
          'ranking_service',
          'match_history_service',
          'detail_filling_service'
        ]

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: check formatting
      run: |
        cd ${{ matrix.service }}
        if ! ./mvnw spotless:check; then
          echo "::error::spotless formatting check failed for ${{ matrix.service }}!"
          echo "to fix locally, run: cd ${{ matrix.service }} && ./mvnw spotless:apply"
          exit 1
        fi

    - name: build and run tests
      run: |
        cd ${{ matrix.service }}
        ./mvnw clean package

  python_build:
    name: build & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [
          'analysis_service',
          'training_service',
        ]

    steps:
      - uses: actions/checkout@v6
      - name: set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          cd ${{ matrix.service }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: lint with ruff
        run: |
          ruff check ${{matrix.service}}
          ruff format --check ${{matrix.service}}

      - name: run tests with pytest
        run: |
          cd ${{ matrix.service }}
          pytest