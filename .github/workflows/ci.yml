name: ScrimFinder CI

on:
  push:
    branches:
      - main
      - 'work/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  java_fast_tests:
    name: java fast tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.6
        ports:
          - 6379:6379
          - 6380:6380
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      SCRIM_DB_USER: ${{ secrets.SCRIM_DB_USER }}
      SCRIM_DB_PASSWORD: ${{ secrets.SCRIM_DB_PASSWORD }}
      SCRIM_REDIS_PASSWORD: ${{ secrets.SCRIM_REDIS_PASSWORD }}
      SCRIM_RABBITMQ_USER: ${{ secrets.SCRIM_RABBITMQ_USER }}
      SCRIM_RABBITMQ_PASSWORD: ${{ secrets.SCRIM_RABBITMQ_PASSWORD }}
      SCRIM_RABBITMQ_ERLANG_COOKIE: ${{ secrets.SCRIM_RABBITMQ_ERLANG_COOKIE }}
    strategy:
      fail-fast: true
      matrix:
        service:
          - matchmaking-service
          - ranking_service
          - match_history_service
          - detail_filling_service

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: check formatting
        run: |
          cd "${{ matrix.service }}"
          ./mvnw -B spotless:check

      - name: run unit and integration-light tests
        run: |
          SERVICES="${{ matrix.service }}" ./scripts/ci/run-java-service-tests.sh fast-tests

  python_fast_tests:
    name: python fast tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - analysis_service
          - training_service
          - jwt_manager

    steps:
      - uses: actions/checkout@v4

      - name: set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: install dependencies
        run: |
          cd "${{ matrix.service }}"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-timeout ruff

      - name: generate gRPC stubs
        run: ./scripts/python/generate-grpc.sh "${{ matrix.service }}"

      - name: lint with ruff
        run: |
          ruff check "${{ matrix.service }}"
          ruff format --check "${{ matrix.service }}"

      - name: run pytest
        run: |
          for service in analysis_service training_service jwt_manager; do
            echo "=== $service unit tests ==="
            pytest "$service/tests/" -v -m "not integration" --timeout=60
          done

  # ── Python integration tests (Docker Compose, BQMock) ────────────────────
  python_integration_tests:
    name: python integration tests
    runs-on: ubuntu-latest
    needs: python_fast_tests
    if: >-
      always() &&
      !contains(needs.python_fast_tests.result, 'failure') &&
      !contains(needs.python_fast_tests.result, 'cancelled')
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: run training service integration tests
        timeout-minutes: 5
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker compose -f docker-compose.test.yml run --rm training-test

      - name: run analysis service integration tests
        timeout-minutes: 5
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker compose -f docker-compose.test.yml run --rm analysis-test

      - name: run jwt manager integration tests
        timeout-minutes: 5
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker compose -f docker-compose.test.yml run --rm jwt-test

      - name: collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Docker Compose PS ==="
          docker compose -f docker-compose.test.yml ps || true
          echo "=== Test container logs ==="
          docker logs scrimfinder_training_test --tail=50 || true
          docker logs scrimfinder_analysis_test --tail=50 || true
          docker logs scrimfinder_jwt_test --tail=50 || true

      - name: cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans

  # ── Terraform validation ─────────────────────────────────────────────────
  terraform_validate:
    name: terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: terraform fmt check
        run: terraform -chdir=infrastructure/terraform fmt -check

      - name: terraform validate
        run: terraform -chdir=infrastructure/terraform validate

  # ── Docker build & push ──────────────────────────────────────────────────
  docker_build_push:
    name: docker build & push
    runs-on: ubuntu-latest
    needs: [python_integration_tests, terraform_validate, java_fast_tests]
    if: >-
      always() &&
      !contains(needs.python_integration_tests.result, 'failure') &&
      !contains(needs.python_integration_tests.result, 'cancelled') &&
      !contains(needs.terraform_validate.result, 'failure') &&
      !contains(needs.terraform_validate.result, 'cancelled') &&
      !contains(needs.java_fast_tests.result, 'failure') &&
      !contains(needs.java_fast_tests.result, 'cancelled')
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: set up Helm
        uses: azure/setup-helm@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: pre-warm maven wrapper
        run: ./matchmaking-service/mvnw -version

      - name: deploy ephemeral GKE stack and run tests in parallel
        run: |
          ./scripts/ci/run-java-service-tests.sh integration-tests &
          TESTS_PID=$!

          if ! ./scripts/ci/deploy-ephemeral-gke.sh; then
            kill "$TESTS_PID" 2>/dev/null || true
            wait "$TESTS_PID" 2>/dev/null || true
            exit 1
          fi

          wait "$TESTS_PID"

      - name: build and push images
        run: ./scripts/ci/build-and-push-images.sh

      - name: deploy app
        id: deploy_app
        run: ./scripts/ci/deploy-app.sh

      - name: run Java system tests
        run: ./scripts/ci/run-system-tests.sh

      - name: teardown ephemeral GKE stack
        if: always()
        run: ./scripts/ci/destroy-ephemeral-gke.sh