name: ScrimFinder CI

concurrency:
  group: scrimfinder-ci
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - 'work/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  java_fast_tests:
    name: java fast tests - ${{ matrix.service }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      SCRIM_DB_USER: ${{ secrets.SCRIM_DB_USER }}
      SCRIM_DB_PASSWORD: ${{ secrets.SCRIM_DB_PASSWORD }}
      SCRIM_REDIS_PASSWORD: ${{ secrets.SCRIM_REDIS_PASSWORD }}
      SCRIM_RABBITMQ_USER: ${{ secrets.SCRIM_RABBITMQ_USER }}
      SCRIM_RABBITMQ_PASSWORD: ${{ secrets.SCRIM_RABBITMQ_PASSWORD }}
      SCRIM_RABBITMQ_ERLANG_COOKIE: ${{ secrets.SCRIM_RABBITMQ_ERLANG_COOKIE }}
    strategy:
      fail-fast: true
      matrix:
        service:
          - matchmaking-service
          - ranking_service
          - match_history_service
          - detail_filling_service

    steps:
      - uses: actions/checkout@v6

      - name: run redis init script
        if: matrix.service == 'detail_filling_service'
        run: ./detail_filling_service/redisInit.sh

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: check formatting
        run: |
          cd "${{ matrix.service }}"
          ./mvnw -B spotless:check

      - name: run unit and integration-light tests
        run: |
          SERVICES="${{ matrix.service }}" ./scripts/ci/run-java-service-tests.sh fast-tests

      - name: run redis shutdown script
        if: matrix.service == 'detail_filling_service' && always()
        run: ./detail_filling_service/redisShutdown.sh

  python_fast_tests:
    name: python fast tests - ${{ matrix.service }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - analysis_service
          - training_service
          - jwt_manager

    steps:
      - uses: actions/checkout@v6

      - name: set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: install dependencies
        run: |
          cd "${{ matrix.service }}"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff pytest pytest-asyncio

      - name: generate gRPC stubs
        run: ./scripts/python/generate-grpc.sh "${{ matrix.service }}"

      - name: lint with ruff
        run: |
          ruff check "${{ matrix.service }}"
          ruff format --check "${{ matrix.service }}"

      - name: run pytest
        run: |
          cd ${{ matrix.service }}
          pytest tests/

  python_heavy_tests:
    name: python heavy tests - emulator integration
    runs-on: ubuntu-latest
    needs: python_fast_tests
    if: >-
      always() &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.python_fast_tests.result, 'failure') &&
      !contains(needs.python_fast_tests.result, 'cancelled')

    steps:
      - uses: actions/checkout@v6

      - name: set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: start BigQuery emulator
        run: |
          docker compose -f docker-compose.test.yml up -d bq-emulator
          # Wait for emulator to be ready
          for i in {1..30}; do
            if curl -s http://localhost:9050/bigquery/v2/projects/test-project/datasets > /dev/null; then
              echo "Emulator is ready"
              break
            fi
            echo "Waiting for emulator... ($i/30)"
            sleep 2
          done

      - name: run training service integration tests with emulator
        env:
          BQ_EMULATOR_HOST: http://localhost:9050
          BQ_PROJECT: test-project
          BQ_DATASET: test_league
          BQ_PLATFORM_DATASET: test_platform
        run: |
          cd training_service
          pip install -r requirements.txt
          pytest tests/test_training_integration.py -v -m "integration and not slow"

      - name: run analysis service integration tests with emulator
        env:
          BQ_EMULATOR_HOST: http://localhost:9050
          BQ_PROJECT: test-project
          BQ_DATASET: test_league
          BQ_PLATFORM_DATASET: test_platform
        run: |
          cd analysis_service
          pip install -r requirements.txt
          pytest tests/test_analysis_integration.py -v -m "integration and not slow"

      - name: run jwt manager integration tests with emulator
        env:
          BQ_EMULATOR_HOST: http://localhost:9050
          BQ_PROJECT: test-project
          BQ_DATASET: test_league
          BQ_PLATFORM_DATASET: test_platform
        run: |
          cd jwt_manager
          pip install -r requirements.txt
          pytest tests/test_jwt_integration.py -v -m "integration and not slow"

      - name: stop BigQuery emulator
        if: always()
        run: docker compose -f docker-compose.test.yml down

  java_heavy_and_gke_system_tests:
    name: integration-heavy and ephemeral GKE system tests
    runs-on: ubuntu-latest
    concurrency:
      group: gke-ephemeral-stack
      cancel-in-progress: false
    needs:
      - java_fast_tests
      - python_fast_tests
    if: >-
      always() &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    env:
      SCRIM_PROJECT_ID: ${{ secrets.SCRIM_PROJECT_ID }}
      SCRIM_REGION: ${{ secrets.SCRIM_REGION }}
      SCRIM_REPO_NAME: ${{ secrets.SCRIM_REPO_NAME }}
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      SCRIM_DB_USER: ${{ secrets.SCRIM_DB_USER }}
      SCRIM_DB_PASSWORD: ${{ secrets.SCRIM_DB_PASSWORD }}
      SCRIM_REDIS_PASSWORD: ${{ secrets.SCRIM_REDIS_PASSWORD }}
      SCRIM_RABBITMQ_USER: ${{ secrets.SCRIM_RABBITMQ_USER }}
      SCRIM_RABBITMQ_PASSWORD: ${{ secrets.SCRIM_RABBITMQ_PASSWORD }}
      SCRIM_RABBITMQ_ERLANG_COOKIE: ${{ secrets.SCRIM_RABBITMQ_ERLANG_COOKIE }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      SCRIM_CLOUD_FUNCTIONS_DEPLOYER_MEMBER: serviceAccount:${{ secrets.GCP_SERVICE_ACCOUNT }}
      PR_NUMBER: ${{ github.event.pull_request.number || '' }}

    steps:
      - uses: actions/checkout@v6

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: derive environment
        run: ./scripts/ci/derive-env.sh

      - name: authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: set up Helm
        uses: azure/setup-helm@v4

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: pre-warm maven wrapper
        run: ./matchmaking-service/mvnw -version

      - name: deploy ephemeral GKE stack and run tests in parallel
        run: |
          ./scripts/ci/run-java-service-tests.sh integration-tests &
          TESTS_PID=$!

          # Proceed with infrastructure deployment while tests run
          ./scripts/ci/deploy-ephemeral-gke.sh

          # Now wait for the background tests to finish
          wait "$TESTS_PID"

      - name: build and push images
        run: ./scripts/ci/build-and-push-images.sh

      - name: deploy app
        id: deploy_app
        run: ./scripts/ci/deploy-app.sh

      - name: run Java system tests
        run: ./scripts/ci/run-system-tests.sh

      - name: teardown ephemeral GKE stack
        if: always()
        run: ./scripts/ci/destroy-ephemeral-gke.sh

