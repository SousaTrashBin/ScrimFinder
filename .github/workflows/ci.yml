name: ScrimFinder CI

on:
  push:
    branches: [ main, work/diogo, work/bruno, work/rodrigo ]

permissions:
  contents: read

jobs:
  quarkus_build:
    name: build & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [
          'matchmaking-service',
          'ranking_service',
          'match_history_service',
          'detail_filling_service'
        ]

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: ${{ matrix.service }}/pom.xml

    - name: check formatting
      run: |
        cd ${{ matrix.service }}
        if ! ./mvnw spotless:check; then
          echo "::error::spotless formatting check failed for ${{ matrix.service }}!"
          echo "to fix locally, run: cd ${{ matrix.service }} && ./mvnw spotless:apply"
          exit 1
        fi

    - name: build and run tests
      run: |
        cd ${{ matrix.service }}
        ./mvnw clean package

  python_build:
    name: build & test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [
          'analysis_service',
          'training_service',
        ]

    # Start a Postgres container for training_service
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
        ports:
          - 5432:5432
        # Wait until postgres is healthy before starting the job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - name: set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: install dependencies
        run: |
          cd ${{ matrix.service }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: lint with ruff
        run: |
          # Note: we check the subdirectory directly to avoid path issues
          cd ${{ matrix.service }}
          ruff check .
          ruff format --check .

      - name: run tests with pytest
        env:
          TEST_PLATFORM_DB_DSN: "host=localhost port=5432 dbname=testdb user=user password=pass"
          MODELS_DIR: ./models
          GAMES_DIR: ./games
          DATASETS_DIR: ./datasets
        run: |
          cd ${{ matrix.service }}
          mkdir -p models games datasets
          pytest