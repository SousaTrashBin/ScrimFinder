services:
  # ── goccy/bigquery-emulator for integration tests ──────────────────────────
  bq-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    container_name: scrimfinder_bq_emulator
    ports:
      - "9050:9050"   # HTTP REST API
      - "9060:9060"   # gRPC
    environment:
      - BIGQUERY_EMULATOR_HTTP_PORT=9050
      - BIGQUERY_EMULATOR_GRPC_PORT=9060
      - BIGQUERY_EMULATOR_PROJECT_ID=test-project
      - BIGQUERY_EMULATOR_DATASET_ID=test_league,test_platform
    volumes:
      - ./bq_emulator_data:/data
    networks:
      - scrimfinder_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9050/bigquery/v2/projects/test-project/datasets"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Training Service (for integration tests with emulator) ─────────────────
  training-test:
    build:
      context: ../training_service
      dockerfile: Dockerfile
    container_name: scrimfinder_training_test
    command: pytest training_service/tests/test_integration.py -v -m integration
    environment:
      - PYTHONPATH=/app
      - BQ_EMULATOR_HOST=http://bq-emulator:9050
      - BQ_PROJECT=test-project
      - BQ_DATASET=test_league
      - BQ_PLATFORM_DATASET=test_platform
      - BQ_LOCATION=US
      - MODELS_DIR=/app/data/models
      - MODEL_RELOAD_INTERVAL=60
      # Disable background services for tests
      - GRPC_PORT=0
      - RABBITMQ_HOST=""
    volumes:
      - ../training_service:/app/training_service
      - ../ml_data:/app/data
    depends_on:
      bq-emulator:
        condition: service_healthy
    networks:
      - scrimfinder_net

  # ── Analysis Service (for integration tests with emulator) ─────────────────
  analysis-test:
    build:
      context: ../analysis_service
      dockerfile: Dockerfile
    container_name: scrimfinder_analysis_test
    command: pytest analysis_service/tests/test_integration.py -v -m integration
    environment:
      - PYTHONPATH=/app
      - BQ_EMULATOR_HOST=http://bq-emulator:9050
      - BQ_PROJECT=test-project
      - BQ_DATASET=test_league
      - BQ_PLATFORM_DATASET=test_platform
      - BQ_LOCATION=US
      - MODELS_DIR=/app/data/models
      - MODEL_RELOAD_INTERVAL=60
      - TRAINING_GRPC_URL=""
    volumes:
      - ../analysis_service:/app/analysis_service
      - ../ml_data:/app/data
    depends_on:
      bq-emulator:
        condition: service_healthy
    networks:
      - scrimfinder_net

networks:
  scrimfinder_net:
    external: true