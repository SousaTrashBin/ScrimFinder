# docker-compose.test.yml
# CI environment: Python services only + BigQuery emulator
# No Java services. No PostgreSQL. No real GCP credentials needed.

services:
  bq-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    container_name: bq_emulator
    command: [
      "--project=test-project",
      "--dataset=scrimfinder",
      "--dataset=scrimfinder_platform"
    ]
    ports:
      - "9050:9050"   # REST API
      - "9060:9060"   # gRPC
    networks:
      - test_net

  redis:
    image: redis:7-alpine
    container_name: test_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test_net

  jwt-manager:
    build:
      context: ./jwt_manager
      dockerfile: Dockerfile
    container_name: test_jwt
    command: uvicorn jwt_manager.main:app --host 0.0.0.0 --port 8002
    environment:
      - PYTHONPATH=/app
      - BQ_PROJECT=test-project
      - BQ_DATASET=scrimfinder
      - BQ_PLATFORM_DATASET=scrimfinder_platform
      - BQ_LOCATION=EU
      - BQ_EMULATOR_HOST=http://bq-emulator:9050
      - GOOGLE_APPLICATION_CREDENTIALS=/dev/null
      - JWT_SECRET=test-secret-key-do-not-use-in-production
      - JWT_ISSUER=scrimfinder/jwt-manager
      - JWT_KEY_ID=test-key-v1
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      bq-emulator:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - test_net

  training-service:
    build:
      context: ./training_service
      dockerfile: Dockerfile
    container_name: test_training
    command: uvicorn training_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - PYTHONPATH=/app
      - BQ_PROJECT=test-project
      - BQ_DATASET=scrimfinder
      - BQ_PLATFORM_DATASET=scrimfinder_platform
      - BQ_LOCATION=EU
      - BQ_EMULATOR_HOST=http://bq-emulator:9050
      - GOOGLE_APPLICATION_CREDENTIALS=/dev/null
      - DATASETS_DIR=/app/ml_data/datasets
      - GAMES_DIR=/app/ml_data/games
      - MODELS_DIR=/app/ml_data/models
      - MODEL_RELOAD_INTERVAL=60
      - GRPC_PORT=50051
    volumes:
      - ./ml_data:/app/ml_data
    depends_on:
      bq-emulator:
        condition: service_started
    networks:
      - test_net

  analysis-service:
    build:
      context: ./analysis_service
      dockerfile: Dockerfile
    container_name: test_analysis
    command: uvicorn analysis_service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
      - BQ_PROJECT=test-project
      - BQ_DATASET=scrimfinder
      - BQ_PLATFORM_DATASET=scrimfinder_platform
      - BQ_LOCATION=EU
      - BQ_EMULATOR_HOST=http://bq-emulator:9050
      - GOOGLE_APPLICATION_CREDENTIALS=/dev/null
      - MODELS_DIR=/app/ml_data/models
      - MODEL_RELOAD_INTERVAL=60
      - TRAINING_GRPC_URL=training-service:50051
    volumes:
      - ./ml_data:/app/ml_data
    depends_on:
      training-service:
        condition: service_started
      bq-emulator:
        condition: service_started
    networks:
      - test_net

networks:
  test_net:
    driver: bridge
