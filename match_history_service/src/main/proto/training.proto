syntax = "proto3";

package scrimfinder;

option java_multiple_files = true;
option java_package = "fc.ul.scrimfinder.grpc";
option java_outer_classname = "TrainingProto";

service TrainingService {
  rpc ForwardMatch (ForwardMatchRequest) returns (ForwardMatchResponse);
}

message ForwardMatchRequest {
  string match_id = 1;
  string source = 2;
}

message ForwardMatchResponse {
  bool success = 1;
  string message = 2;
  string game_id = 3;
  bool draft_ok = 4;
  bool build_ok = 5;
  bool perf_ok = 6;
}
