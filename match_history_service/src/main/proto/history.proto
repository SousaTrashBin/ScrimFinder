syntax = "proto3";

package fc.ul.scrimfinder.grpc;

option java_multiple_files = true;
option java_package = "fc.ul.scrimfinder.grpc";
option java_outer_classname = "MatchHistoryProto";

service MatchHistoryService {
  rpc AddMatch (AddMatchRequest) returns (AddMatchResponse) {}
  rpc DeleteMatch (DeleteMatchRequest) returns (DeleteMatchResponse) {}
}

message AddMatchRequest {
  string gameId = 1;
  string queueId = 2;
  map<string, int32> playerMMRGains = 3;
}

message AddMatchResponse {
  bool success = 1;
  string message = 2;
}

message DeleteMatchRequest {
  string gameId = 1;
}

message DeleteMatchResponse {
  bool success = 1;
  string message = 2;
}

