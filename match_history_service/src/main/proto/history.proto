syntax = "proto3";

package fc.ul.scrimfinder.grpc;

option java_multiple_files = true;
option java_package = "fc.ul.scrimfinder.grpc";
option java_outer_classname = "MatchHistoryProto";

service MatchHistoryService {
  rpc SaveMatchMMRGains (SaveMatchMMRGainsRequest) returns (SaveMatchMMRGainsResponse) {}
}

message SaveMatchMMRGainsRequest {
  string gameId = 1;
  map<string, int32> playerMMRGains = 2;
}

message SaveMatchMMRGainsResponse {
  bool success = 1;
  string message = 2;
}
