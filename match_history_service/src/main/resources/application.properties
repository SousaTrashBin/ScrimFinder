quarkus.log.level=INFO
quarkus.log.min-level=INFO
quarkus.log.console.async.enabled=true

quarkus.shutdown.delay-enabled=true
quarkus.shutdown.delay=3
quarkus.http.root-path=/api/v1/history
quarkus.http.port=${HTTP_PORT:8080}

quarkus.grpc.clients.training-service.host=${TRAINING_SVC_HOST:training-service}
quarkus.grpc.clients.training-service.port=${TRAINING_SVC_RPC_PORT:50051}
quarkus.grpc.clients.training-service.plain-text=true
quarkus.rest-client.detail-filling-service.url=${PLAYER_FILLING_SVC_URL:http://detail-filling-service:8080/api/v1/riot}

rabbitmq-host=${RABBITMQ_HOST:rabbitmq}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USER:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}
mp.messaging.incoming.history-add-match-events.connector=smallrye-rabbitmq
mp.messaging.incoming.history-add-match-events.exchange.name=scrim.history.add-match
mp.messaging.incoming.history-add-match-events.queue.name=scrim.history.add-match.q
mp.messaging.incoming.history-add-match-events.routing-keys=history.add-match

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}

# Default Persistence Unit (Primary)
quarkus.hibernate-orm.packages=fc.ul.scrimfinder.domain
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.schema-management.strategy=none


quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration
quarkus.datasource.jdbc.max-size=50

# Test profile configuration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=docs
quarkus.smallrye-openapi.path=openapi.yaml
quarkus.openapi.always-include=true
