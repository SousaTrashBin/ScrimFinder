quarkus.log.level=INFO
quarkus.log.min-level=INFO
quarkus.shutdown.delay-enabled=true
quarkus.shutdown.delay=3
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=${DB_URL:jdbc:h2:mem:matches}
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.http.port=${HTTP_PORT:8080}
config.detail-filling-api/mp-rest/url=${DETAIL_FILLING_SERVICE_URL:http://localhost:8081}
config.analysis-api/mp-rest/url=${ANALYSIS_SERVICE_URL:http://localhost:8082}