openapi: 3.1.0
info:
  title: ScrimFinder API (Group 21)
  version: 1.0.0
paths:
  /api/v1/analysis/draft:
    post:
      tags:
      - Analysis
      summary: Win probability for a 5v5 draft
      description: Returns ML-predicted win probabilities for both teams, plus synergy
        analysis, counter matchups, and win conditions. Requires an active draft model.
      operationId: analyze_draft_api_v1_analysis_draft_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/analysis_DraftAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_DraftAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_HTTPValidationError'
  /api/v1/analysis/build:
    post:
      tags:
      - Analysis
      summary: "Build effectiveness score (0\u2013100)"
      description: Scores an item build for a champion using the trained build model.
        Score is derived from predicted win probability. Optionally considers enemy
        composition for alternative suggestions.
      operationId: analyze_build_api_v1_analysis_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/analysis_BuildAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_BuildAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_HTTPValidationError'
  /api/v1/analysis/player:
    post:
      tags:
      - Analysis
      summary: Player performance analysis and improvement tips
      description: Aggregates a player's recent match stats and benchmarks each metric
        against the EUW population for their role using stored percentile data. Returns
        prioritised improvement tips.
      operationId: analyze_player_api_v1_analysis_player_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/analysis_PlayerAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_PlayerAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_HTTPValidationError'
  /api/v1/analysis/game:
    post:
      tags:
      - Analysis
      summary: Post-game breakdown for all 10 players
      description: 'Scores each player''s performance using the performance model.
        Supply a `game_id` (stored game) or inline `raw_data`. Participants must have:
        puuid, championId, teamId, position, win, kills, deaths, assists, gold, cs,
        dmg_champs, vision, kda, kp.'
      operationId: analyze_game_api_v1_analysis_game_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/analysis_GameAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_GameAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_HTTPValidationError'
  /api/v1/analysis/champion:
    post:
      tags:
      - Analysis
      summary: Champion stats from EUW dataset
      description: "Returns win rate, pick rate, average stats, and counter data for\
        \ a champion. Queries the EUW dataset directly \u2014 no model required."
      operationId: analyze_champion_api_v1_analysis_champion_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/analysis_ChampionAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ChampionAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analysis_HTTPValidationError'
  /api/v1/analysis/:
    get:
      tags:
      - System
      summary: Root
      operationId: root_api_v1_analysis__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/analysis/health:
    get:
      tags:
      - System
      summary: Health
      operationId: health_api_v1_analysis_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/analysis/q/health/ready:
    get:
      tags:
      - System
      summary: Health
      operationId: health_api_v1_analysis_q_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/analysis/q/health/live:
    get:
      tags:
      - System
      summary: Health
      operationId: health_api_v1_analysis_q_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/training/games:
    post:
      tags:
      - Games
      summary: Ingest a single match
      operationId: ingest_game_api_v1_training_games_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_GameIngest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_GameIngested'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    get:
      tags:
      - Games
      summary: List games
      operationId: list_games_api_v1_training_games_get
      parameters:
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Data source filter
          examples:
          - manual
          title: Source
        description: Data source filter
      - name: patch
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Game patch filter
          examples:
          - '14.10'
          title: Patch
        description: Game patch filter
      - name: match_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Queue/mode filter
          examples:
          - RANKED_SOLO_5x5
          title: Match Type
        description: Queue/mode filter
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Page size
          examples:
          - 50
          default: 50
          title: Limit
        description: Page size
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset
          examples:
          - 0
          default: 0
          title: Offset
        description: Pagination offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_GameListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/games/batch:
    post:
      tags:
      - Games
      summary: Ingest up to 1000 matches
      operationId: ingest_batch_api_v1_training_games_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_BatchIngestRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_BatchIngestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/games/{game_id}:
    get:
      tags:
      - Games
      summary: Fetch stored match
      operationId: get_game_api_v1_training_games__game_id__get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          description: Stored game id. Riot ids like REGION_MATCHID are supported.
          examples:
          - VN_1417849076
          title: Game Id
        description: Stored game id. Riot ids like REGION_MATCHID are supported.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_GameDetail'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    delete:
      tags:
      - Games
      summary: Delete a game
      operationId: delete_game_api_v1_training_games__game_id__delete
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          description: Stored game id to delete.
          examples:
          - VN_1417849076
          title: Game Id
        description: Stored game id to delete.
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/features/extract:
    post:
      tags:
      - Features
      summary: Extract feature vectors
      operationId: extract_features_api_v1_training_features_extract_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_FeatureExtractRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_FeatureExtractResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/features/{game_id}:
    get:
      tags:
      - Features
      summary: Get cached features
      operationId: get_features_api_v1_training_features__game_id__get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/training_Concern'
          - type: 'null'
          title: Concern
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/training_FeatureVector'
                title: Response Get Features Api V1 Training Features  Game Id  Get
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    delete:
      tags:
      - Features
      summary: Delete cached features
      operationId: delete_features_api_v1_training_features__game_id__delete
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/training_Concern'
          - type: 'null'
          title: Concern
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/datasets:
    post:
      tags:
      - Datasets
      summary: Register dataset
      operationId: create_dataset_api_v1_training_datasets_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_DatasetCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_DatasetMeta'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    get:
      tags:
      - Datasets
      summary: List datasets
      operationId: list_datasets_api_v1_training_datasets_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concern
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_DatasetListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/datasets/build:
    post:
      tags:
      - Datasets
      summary: Create and build dataset
      operationId: build_dataset_api_v1_training_datasets_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_DatasetBuildRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_DatasetMeta'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/datasets/{dataset_id}:
    get:
      tags:
      - Datasets
      summary: Get dataset
      operationId: get_dataset_api_v1_training_datasets__dataset_id__get
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_DatasetMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    delete:
      tags:
      - Datasets
      summary: Delete dataset
      operationId: delete_dataset_api_v1_training_datasets__dataset_id__delete
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/datasets/{dataset_id}/build:
    post:
      tags:
      - Datasets
      summary: Rebuild dataset
      operationId: rebuild_dataset_api_v1_training_datasets__dataset_id__build_post
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_DatasetMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/jobs:
    post:
      tags:
      - Training
      summary: Start a training job
      operationId: create_job_api_v1_training_jobs_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/training_TrainingJobCreate'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
    get:
      tags:
      - Training
      summary: List jobs
      operationId: list_jobs_api_v1_training_jobs_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Concern filter
          examples:
          - draft
          title: Concern
        description: Concern filter
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/training_JobStatus'
          - type: 'null'
          description: Job status filter
          title: Status
        description: Job status filter
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Maximum jobs to return
          examples:
          - 100
          default: 100
          title: Limit
        description: Maximum jobs to return
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_TrainingJobListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/jobs/{job_id}:
    get:
      tags:
      - Training
      summary: Get job status
      operationId: get_job_api_v1_training_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          description: Training job id
          examples:
          - job_123456abcdef
          title: Job Id
        description: Training job id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/jobs/{job_id}/cancel:
    post:
      tags:
      - Training
      summary: Cancel a job
      operationId: cancel_job_api_v1_training_jobs__job_id__cancel_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          description: Training job id
          examples:
          - job_123456abcdef
          title: Job Id
        description: Training job id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/jobs/{job_id}/deploy:
    post:
      tags:
      - Training
      summary: Deploy model from job
      operationId: deploy_job_api_v1_training_jobs__job_id__deploy_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          description: Training job id
          examples:
          - job_123456abcdef
          title: Job Id
        description: Training job id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/models:
    get:
      tags:
      - Models
      summary: List all models
      operationId: list_models_api_v1_training_models_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concern
      - name: active_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Active Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ModelListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_HTTPValidationError'
  /api/v1/training/models/active:
    get:
      tags:
      - Models
      summary: List active models
      operationId: list_active_api_v1_training_models_active_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/training_ModelListResponse'
  /api/v1/training/models/{model_id}:
    get:
      tags:
      - Models
      summary: Get model metadata
      operationId: get_model_api_v1_training_models__model_id__get
      parameters:
      - name: model_id
        in: path
