openapi: 3.1.0
info:
  title: ScrimFinder Analysis API
  description: 'Unified ML platform for LoL match analysis.


    '
  version: 2.0.0
paths:
  /games:
    post:
      tags:
      - Games
      summary: Ingest a single match
      operationId: ingest_game_games_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameIngest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameIngested'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Games
      summary: List games (paginated)
      operationId: list_games_games_get
      parameters:
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Source
      - name: patch
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Patch
      - name: match_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Match Type
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /games/batch:
    post:
      tags:
      - Games
      summary: Ingest up to 1000 matches
      operationId: ingest_batch_games_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIngestRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /games/{game_id}:
    get:
      tags:
      - Games
      summary: Fetch stored match + raw JSON
      operationId: get_game_games__game_id__get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDetail'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Games
      summary: Delete a game
      operationId: delete_game_games__game_id__delete
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /features/extract:
    post:
      tags:
      - Features
      summary: Extract feature vectors
      description: 'Extract features for a stored game or inline JSON.


        > **Stub:** Returns empty vectors until ingestion/feature_extractor.py is
        built.'
      operationId: extract_features_features_extract_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureExtractRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureExtractResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /features/{game_id}:
    get:
      tags:
      - Features
      summary: Retrieve cached feature vectors
      operationId: get_features_features__game_id__get
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Concern'
          - type: 'null'
          title: Concern
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureVector'
                title: Response Get Features Features  Game Id  Get
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Features
      summary: Delete cached features
      operationId: delete_features_features__game_id__delete
      parameters:
      - name: game_id
        in: path
        required: true
        schema:
          type: string
          title: Game Id
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Concern'
          - type: 'null'
          title: Concern
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /datasets:
    post:
      tags:
      - Datasets
      summary: Register dataset (metadata only)
      operationId: create_dataset_datasets_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMeta'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Datasets
      summary: List datasets
      operationId: list_datasets_datasets_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concern
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /datasets/build:
    post:
      tags:
      - Datasets
      summary: Create + build dataset
      description: 'Registers and builds in background.


        > **Stub:** Builder marks ready immediately with row_count=0.'
      operationId: build_dataset_datasets_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetBuildRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMeta'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /datasets/{dataset_id}:
    get:
      tags:
      - Datasets
      summary: Get dataset metadata
      operationId: get_dataset_datasets__dataset_id__get
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Datasets
      summary: Delete dataset
      operationId: delete_dataset_datasets__dataset_id__delete
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /datasets/{dataset_id}/build:
    post:
      tags:
      - Datasets
      summary: Rebuild dataset
      operationId: rebuild_dataset_datasets__dataset_id__build_post
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /training/jobs:
    post:
      tags:
      - Training
      summary: Create and start a training job
      description: Starts async training. Use `dataset_id` for fast training from
        a pre-built dataset, or `sample`/`limit` for inline EUW DB queries.
      operationId: create_job_training_jobs_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingJobCreate'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Training
      summary: List all training jobs
      operationId: list_jobs_training_jobs_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concern
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/JobStatus'
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /training/jobs/{job_id}:
    get:
      tags:
      - Training
      summary: Get job status + progress
      operationId: get_job_training_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /training/jobs/{job_id}/cancel:
    post:
      tags:
      - Training
      summary: Cancel a running job
      operationId: cancel_job_training_jobs__job_id__cancel_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /training/jobs/{job_id}/deploy:
    post:
      tags:
      - Training
      summary: Activate the model from a completed job
      description: Promotes the produced model to active status. Analysis endpoints
        will use it immediately.
      operationId: deploy_job_training_jobs__job_id__deploy_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingJobResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /models:
    get:
      tags:
      - Models
      summary: List all models
      operationId: list_models_models_get
      parameters:
      - name: concern
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Concern
      - name: active_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Active Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /models/active:
    get:
      tags:
      - Models
      summary: List currently active models
      description: Returns the deployed model for each concern. Analysis returns 503
        for concerns with no active model.
      operationId: list_active_models_active_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
  /models/{model_id}:
    get:
      tags:
      - Models
      summary: Get model metadata
      operationId: get_model_models__model_id__get
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: integer
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Models
      summary: Delete a model record
      description: Cannot delete active models — deactivate first.
      operationId: delete_model_models__model_id__delete
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: integer
          title: Model Id
      responses:
        '204':
          description: Successful Response
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /models/{model_id}/activate:
    post:
      tags:
      - Models
      summary: Activate (deploy) a model
      operationId: activate_models__model_id__activate_post
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: integer
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /models/{model_id}/deactivate:
    post:
      tags:
      - Models
      summary: Take a model offline
      operationId: deactivate_models__model_id__deactivate_post
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: integer
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelMeta'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/draft:
    post:
      tags:
      - Analysis
      summary: Real-time draft win probability
      description: Win probabilities + synergies for a 5v5 draft. Requires active
        draft model.
      operationId: analyze_draft_analysis_draft_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/build:
    post:
      tags:
      - Analysis
      summary: Build effectiveness score
      description: Score 0–100 for an item build. Requires active build model.
      operationId: analyze_build_analysis_build_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/player:
    post:
      tags:
      - Analysis
      summary: Player performance analysis + tips
      description: Aggregates stats and benchmarks vs tier average. Requires active
        performance model.
      operationId: analyze_player_analysis_player_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/game:
    post:
      tags:
      - Analysis
      summary: Post-game analysis
      operationId: analyze_game_analysis_game_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/analysis/game:
    post:
      tags:
      - Analysis
      summary: Post-game breakdown for all 10 players
      description: Requires a stored game (game_id) or inline raw_data. Feature extraction
        must be implemented for real scores.
      operationId: analyze_game_analysis_analysis_game_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /analysis/champion:
    post:
      tags:
      - Analysis
      summary: Champion stats from EUW DB
      description: No model required — queries LEAGUE_DB directly.
      operationId: analyze_champion_analysis_champion_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChampionAnalysisRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChampionAnalysisResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      tags:
